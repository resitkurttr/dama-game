<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 Dama King</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 12px;
            gap: 12px;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 { font-size: 24px; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .score-board { display: flex; gap: 20px; font-size: 16px; }
        .score-board .player {
            padding: 8px 16px; border-radius: 10px;
            background: rgba(255,255,255,0.08); text-align: center;
            border: 2px solid transparent; min-width: 90px;
        }
        .score-board .player.active { background: rgba(255,215,0,0.25); border-color: gold; }
        .score-board .pieces { font-size: 12px; opacity: 0.7; margin-top: 2px; }
        #board {
            display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 2px; padding: 5px; background: #8B4513;
            border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .cell {
            width: clamp(36px, calc((100vw - 60px) / 8), 48px);
            height: clamp(36px, calc((100vw - 60px) / 8), 48px);
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; position: relative;
        }
        .cell.light { background: #DEB887; }
        .cell.dark { background: #8B4513; }
        .cell.sel { background: #FFD700 !important; box-shadow: inset 0 0 12px rgba(255,165,0,0.6); }
        .cell.mv::after {
            content: ''; position: absolute; width: 28%; height: 28%;
            border-radius: 50%; background: rgba(76,175,80,0.7);
        }
        .cell.jp::after {
            content: ''; position: absolute; width: 45%; height: 45%;
            border-radius: 50%; background: rgba(255,87,34,0.7);
        }
        .pc {
            width: 72%; height: 72%; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(11px, 2.5vw, 16px); z-index: 2;
        }
        .pc.bk { background: linear-gradient(145deg, #3a3a3a, #111); box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .pc.wh { background: linear-gradient(145deg, #fff, #ccc); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .pc.king { border-color: gold; box-shadow: 0 0 10px gold; }
        .info { font-size: 15px; padding: 8px 20px; background: rgba(255,255,255,0.08); border-radius: 18px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 28px; font-size: 15px; border: none; border-radius: 18px;
            cursor: pointer; font-weight: bold; min-width: 140px;
        }
        .btn-gold { background: linear-gradient(145deg, #FFD700, #FFA500); color: #1a1a2e; }
        .btn-green { background: linear-gradient(145deg, #4CAF50, #2E7D32); color: white; }
        .btn-red { background: linear-gradient(145deg, #f44336, #b71c1c); color: white; }
        .overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 100;
            align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        }
        .overlay.show { display: flex; }
        .overlay h2 { font-size: 28px; text-shadow: 0 0 30px gold; }
        .overlay p { font-size: 18px; }
    </style>
</head>
<body>
    <h1>🎲 Dama King</h1>
    <div class="score-board">
        <div class="player active" id="p1"><span id="p1n">⚫ Siyah</span><div class="pieces" id="p1c">12 taş</div></div>
        <div class="player" id="p2"><span id="p2n">⚪ Beyaz</span><div class="pieces" id="p2c">12 taş</div></div>
    </div>
    <div id="board"></div>
    <div class="info" id="status">⚫ Siyah'ın sırası</div>
    <div class="btn-group">
        <button class="btn btn-gold" id="btnNew">🔄 Yeni Oyun</button>
        <button class="btn btn-red" id="btnUndo">↩️ Geri Al</button>
    </div>

    <div class="overlay" id="overlay">
        <h2 id="winnerText"></h2>
        <p id="winnerSub"></p>
        <button class="btn btn-green" id="btnAgain">🔄 Tekrar Oyna</button>
    </div>

    <script>
    (function() {
        var ROWS = 8, COLS = 8;
        var board = [], selected = null, currentPlayer = 'black';
        var mustJump = false, jumpPiece = null;
        var history = [];

        function saveState() {
            var snap = [];
            for (var r = 0; r < ROWS; r++) {
                snap[r] = [];
                for (var c = 0; c < COLS; c++) {
                    var p = board[r][c];
                    snap[r][c] = p ? { color: p.color, king: p.king } : null;
                }
            }
            history.push({ board: snap, player: currentPlayer });
            if (history.length > 50) history.shift();
        }

        function initBoard() {
            board = [];
            for (var r = 0; r < ROWS; r++) {
                board[r] = [];
                for (var c = 0; c < COLS; c++) {
                    if ((r + c) % 2 === 1) {
                        if (r < 3) board[r][c] = { color: 'white', king: false };
                        else if (r > 4) board[r][c] = { color: 'black', king: false };
                        else board[r][c] = null;
                    } else {
                        board[r][c] = null;
                    }
                }
            }
        }

        function getValidMoves(r, c) {
            var piece = board[r][c];
            if (!piece) return [];
            var moves = [];
            var dirs;
            if (piece.king) dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
            else if (piece.color === 'black') dirs = [[-1,-1],[-1,1]];
            else dirs = [[1,-1],[1,1]];

            for (var i = 0; i < dirs.length; i++) {
                var dr = dirs[i][0], dc = dirs[i][1];
                var nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    if (!board[nr][nc]) {
                        moves.push({ r: nr, c: nc, isJump: false });
                    } else if (board[nr][nc].color !== piece.color) {
                        var jr = nr + dr, jc = nc + dc;
                        if (jr >= 0 && jr < ROWS && jc >= 0 && jc < COLS && !board[jr][jc]) {
                            moves.push({ r: jr, c: jc, isJump: true, captured: { r: nr, c: nc } });
                        }
                    }
                }
            }
            return moves;
        }

        function hasAnyJumps(color) {
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++)
                    if (board[r][c] && board[r][c].color === color)
                        if (getValidMoves(r, c).some(function(m) { return m.isJump; }))
                            return true;
            return false;
        }

        function renderBoard() {
            var el = document.getElementById('board');
            el.innerHTML = '';
            var highlightMoves = [];

            if (selected) {
                highlightMoves = getValidMoves(selected.r, selected.c);
            }

            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    var cell = document.createElement('div');
                    cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

                    if (selected && selected.r === r && selected.c === c) {
                        cell.classList.add('sel');
                    }

                    var isMoveTarget = highlightMoves.find(function(m) { return m.r === r && m.c === c; });
                    if (isMoveTarget) {
                        cell.classList.add(isMoveTarget.isJump ? 'jp' : 'mv');
                    }

                    var piece = board[r][c];
                    if (piece) {
                        var pc = document.createElement('div');
                        pc.className = 'pc ' + (piece.color === 'black' ? 'bk' : 'wh') + (piece.king ? ' king' : '');
                        if (piece.king) pc.innerHTML = '👑';
                        cell.appendChild(pc);
                    }

                    // Closure ile tıklama olayı
                    (function(row, col) {
                        cell.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            onCellClick(row, col);
                        });
                    })(r, c);

                    el.appendChild(cell);
                }
            }
            updateScore();
        }

        function onCellClick(r, c) {
            // Zorunlu zıplama devam ediyorsa
            if (mustJump && jumpPiece) {
                var jMoves = getValidMoves(jumpPiece.r, jumpPiece.c).filter(function(m) { return m.isJump; });
                var target = jMoves.find(function(m) { return m.r === r && m.c === c; });
                if (target) {
                    saveState();
                    doJump(jumpPiece.r, jumpPiece.c, target);
                } else {
                    mustJump = false;
                    jumpPiece = null;
                    switchPlayer();
                }
                return;
            }

            var piece = board[r][c];

            // Taş seçimi
            if (piece && piece.color === currentPlayer) {
                if (hasAnyJumps(currentPlayer)) {
                    var moves = getValidMoves(r, c);
                    if (moves.some(function(m) { return m.isJump; })) {
                        selected = { r: r, c: c };
                        renderBoard();
                    }
                    return;
                }
                selected = { r: r, c: c };
                renderBoard();
                return;
            }

            // Taşı taşıma
            if (selected) {
                var moves = getValidMoves(selected.r, selected.c);
                var move = moves.find(function(m) { return m.r === r && m.c === c; });
                if (move) {
                    saveState();
                    if (move.isJump) {
                        doJump(selected.r, selected.c, move);
                    } else {
                        doMove(selected.r, selected.c, r, c);
                    }
                } else {
                    selected = null;
                    renderBoard();
                }
            }
        }

        function doMove(fr, fc, tr, tc) {
            board[tr][tc] = board[fr][fc];
            board[fr][fc] = null;
            promote(tr, tc);
            selected = null;
            switchPlayer();
        }

        function doJump(fr, fc, move) {
            board[move.r][move.c] = board[fr][fc];
            board[fr][fc] = null;
            board[move.captured.r][move.captured.c] = null;
            promote(move.r, move.c);

            var next = getValidMoves(move.r, move.c).filter(function(m) { return m.isJump; });
            if (next.length > 0) {
                selected = { r: move.r, c: move.c };
                mustJump = true;
                jumpPiece = { r: move.r, c: move.c };
                renderBoard();
                return;
            }
            selected = null;
            mustJump = false;
            jumpPiece = null;
            switchPlayer();
        }

        function promote(r, c) {
            var p = board[r][c];
            if (p && !p.king) {
                if ((p.color === 'black' && r === 0) || (p.color === 'white' && r === 7)) {
                    p.king = true;
                }
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            selected = null;

            var bc = 0, wc = 0;
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++) {
                    if (board[r][c] && board[r][c].color === 'black') bc++;
                    if (board[r][c] && board[r][c].color === 'white') wc++;
                }

            if (bc === 0) { showWin('⚪ Beyaz Kazandı!', 'Tüm siyah taşlar yok edildi'); return; }
            if (wc === 0) { showWin('⚫ Siyah Kazandı!', 'Tüm beyaz taşlar yok edildi'); return; }

            var hasMove = false;
            for (var r = 0; r < ROWS && !hasMove; r++)
                for (var c = 0; c < COLS && !hasMove; c++)
                    if (board[r][c] && board[r][c].color === currentPlayer && getValidMoves(r, c).length > 0)
                        hasMove = true;

            if (!hasMove) {
                var winner = currentPlayer === 'black' ? '⚪ Beyaz' : '⚫ Siyah';
                showWin(winner + ' Kazandı!', 'Hamle hakkı kalmadı');
                return;
            }

            document.getElementById('status').textContent =
                (currentPlayer === 'black' ? '⚫ Siyah' : '⚪ Beyaz') + "'ın sırası";
            renderBoard();
        }

        function updateScore() {
            var bc = 0, wc = 0;
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++) {
                    if (board[r][c] && board[r][c].color === 'black') bc++;
                    if (board[r][c] && board[r][c].color === 'white') wc++;
                }
            document.getElementById('p1c').textContent = bc + ' taş';
            document.getElementById('p2c').textContent = wc + ' taş';
            document.getElementById('p1').classList.toggle('active', currentPlayer === 'black');
            document.getElementById('p2').classList.toggle('active', currentPlayer === 'white');
        }

        function showWin(text, sub) {
            document.getElementById('winnerText').textContent = '🏆 ' + text;
            document.getElementById('winnerSub').textContent = sub;
            document.getElementById('overlay').classList.add('show');
        }

        function undoMove() {
            if (history.length === 0) return;
            var prev = history.pop();
            board = prev.board;
            currentPlayer = prev.player;
            selected = null;
            mustJump = false;
            jumpPiece = null;
            document.getElementById('status').textContent =
                (currentPlayer === 'black' ? '⚫ Siyah' : '⚪ Beyaz') + "'ın sırası";
            renderBoard();
        }

        function resetGame() {
            history = [];
            initBoard();
            currentPlayer = 'black';
            selected = null;
            mustJump = false;
            jumpPiece = null;
            document.getElementById('status').textContent = "⚫ Siyah'ın sırası";
            document.getElementById('overlay').classList.remove('show');
            renderBoard();
        }

        // ─── Buton olayları ───
        document.getElementById('btnNew').addEventListener('click', resetGame);
        document.getElementById('btnAgain').addEventListener('click', function() {
            resetGame();
        });
        document.getElementById('btnUndo').addEventListener('click', undoMove);

        resetGame();
    })();
    </script>
</body>
</html>
