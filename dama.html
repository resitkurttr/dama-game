<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 Dama King</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 10px;
            gap: 14px;
        }
        h1 {
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .score-board {
            display: flex;
            gap: 24px;
            font-size: 18px;
        }
        .score-board .player {
            padding: 8px 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            text-align: center;
            border: 2px solid transparent;
        }
        .score-board .player.active {
            background: rgba(255,215,0,0.3);
            border-color: gold;
        }
        .score-board .pieces {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 2px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            padding: 6px;
            background: #8B4513;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: calc(100vw - 20px);
        }
        .cell {
            width: clamp(36px, 10vw, 50px);
            height: clamp(36px, 10vw, 50px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            border-radius: 5px;
            position: relative;
        }
        .cell.light { background: #DEB887; }
        .cell.dark { background: #8B4513; }
        .cell.selected { background: #FFD700 !important; box-shadow: 0 0 15px gold; }
        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.6);
            box-shadow: 0 0 8px #4CAF50;
        }
        .cell.valid-jump::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background: rgba(255, 87, 34, 0.6);
            box-shadow: 0 0 10px #FF5722;
        }
        .piece {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(12px, 3vw, 18px);
            z-index: 2;
        }
        .piece.black {
            background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
            box-shadow: 0 3px 8px rgba(0,0,0,0.6);
        }
        .piece.white {
            background: linear-gradient(145deg, #ffffff, #d0d0d0);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        .piece.king {
            border: 3px solid gold;
            box-shadow: 0 0 12px gold;
        }
        .cell:active .piece { transform: scale(1.15); }

        .status {
            font-size: 16px;
            padding: 10px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            text-align: center;
        }
        .btn {
            padding: 12px 36px;
            font-size: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s;
            min-width: 160px;
        }
        .btn:active { transform: scale(0.95); }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        .overlay.show { display: flex; }
        .overlay h2 { font-size: 32px; text-shadow: 0 0 30px gold; }
        .overlay p { font-size: 20px; }
        .overlay .btn { background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; }
    </style>
</head>
<body>
    <h1>🎲 Dama King</h1>

    <div class="score-board">
        <div class="player active" id="p1-info">
            ⚫ Siyah
            <div class="pieces" id="p1-pieces">12 taş</div>
        </div>
        <div class="player" id="p2-info">
            ⚪ Beyaz
            <div class="pieces" id="p2-pieces">12 taş</div>
        </div>
    </div>

    <div id="board"></div>

    <div class="status" id="status">⚫ Siyah'ın sırası</div>

    <button class="btn" id="btnNewGame">🔄 Yeni Oyun</button>

    <div class="overlay" id="overlay">
        <h2 id="winner-text"></h2>
        <p id="winner-sub"></p>
        <button class="btn" id="btnPlayAgain">🔄 Tekrar Oyna</button>
    </div>

    <script>
        const ROWS = 8, COLS = 8;
        let board = [], selected = null, currentPlayer = 'black';
        let mustJump = false, jumpPiece = null;

        // ─── Buton Binding ───
        document.getElementById('btnNewGame').addEventListener('click', resetGame);
        document.getElementById('btnPlayAgain').addEventListener('click', function() {
            resetGame();
            document.getElementById('overlay').classList.remove('show');
        });

        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    if ((r + c) % 2 === 1) {
                        if (r < 3) board[r][c] = { color: 'white', king: false };
                        else if (r > 4) board[r][c] = { color: 'black', king: false };
                        else board[r][c] = null;
                    } else {
                        board[r][c] = null;
                    }
                }
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

                    if (selected && selected.r === r && selected.c === c) {
                        cell.classList.add('selected');
                    }

                    // Geçerli hamleleri göster (sadece seçili taş için)
                    if (selected) {
                        const moves = getValidMoves(selected.r, selected.c);
                        const isTarget = moves.find(function(m) { return m.r === r && m.c === c; });
                        if (isTarget) {
                            cell.classList.add(isTarget.isJump ? 'valid-jump' : 'valid-move');
                        }
                    }

                    var piece = board[r][c];
                    if (piece) {
                        var pieceEl = document.createElement('div');
                        pieceEl.className = 'piece ' + piece.color + (piece.king ? ' king' : '');
                        pieceEl.textContent = piece.king ? '👑' : '';
                        cell.appendChild(pieceEl);
                    }

                    (function(row, col) {
                        cell.addEventListener('click', function(e) {
                            e.stopPropagation();
                            handleClick(row, col);
                        });
                        cell.addEventListener('touchend', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            handleClick(row, col);
                        });
                    })(r, c);

                    boardEl.appendChild(cell);
                }
            }
            updateScore();
        }

        function getValidMoves(r, c) {
            var piece = board[r][c];
            if (!piece) return [];

            var moves = [];
            var dirs;
            if (piece.king) {
                dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
            } else if (piece.color === 'black') {
                dirs = [[-1,-1],[-1,1]];
            } else {
                dirs = [[1,-1],[1,1]];
            }

            for (var i = 0; i < dirs.length; i++) {
                var dr = dirs[i][0], dc = dirs[i][1];
                var nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    if (!board[nr][nc]) {
                        moves.push({ r: nr, c: nc, isJump: false });
                    } else if (board[nr][nc].color !== piece.color) {
                        var jr = nr + dr, jc = nc + dc;
                        if (jr >= 0 && jr < ROWS && jc >= 0 && jc < COLS && !board[jr][jc]) {
                            moves.push({ r: jr, c: jc, isJump: true, captured: { r: nr, c: nc } });
                        }
                    }
                }
            }
            return moves;
        }

        function hasAnyJumps(color) {
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++)
                    if (board[r][c] && board[r][c].color === color)
                        if (getValidMoves(r, c).some(function(m) { return m.isJump; }))
                            return true;
            return false;
        }

        function handleClick(r, c) {
            // Zorunlu zıplama devam ediyor
            if (mustJump && jumpPiece) {
                var jMoves = getValidMoves(jumpPiece.r, jumpPiece.c).filter(function(m) { return m.isJump; });
                var target = jMoves.find(function(m) { return m.r === r && m.c === c; });
                if (target) {
                    executeJump(jumpPiece.r, jumpPiece.c, target);
                } else {
                    // Başka zıplama yok, sırayı değiştir
                    mustJump = false;
                    jumpPiece = null;
                    switchPlayer();
                }
                return;
            }

            var piece = board[r][c];

            // Taş seçimi
            if (piece && piece.color === currentPlayer) {
                if (hasAnyJumps(currentPlayer)) {
                    var moves = getValidMoves(r, c);
                    if (moves.some(function(m) { return m.isJump; })) {
                        selected = { r: r, c: c };
                        renderBoard();
                    }
                    // Diğer taşları seçmeye izin verme
                    return;
                }
                selected = { r: r, c: c };
                renderBoard();
                return;
            }

            // Boş kareye tıklama (seçili taşı taşı)
            if (selected) {
                var moves = getValidMoves(selected.r, selected.c);
                var move = moves.find(function(m) { return m.r === r && m.c === c; });
                if (move) {
                    if (move.isJump) {
                        executeJump(selected.r, selected.c, move);
                    } else {
                        executeMove(selected.r, selected.c, r, c);
                    }
                } else {
                    selected = null;
                    renderBoard();
                }
            }
        }

        function executeMove(fromR, fromC, toR, toC) {
            board[toR][toC] = board[fromR][fromC];
            board[fromR][fromC] = null;
            promoteKing(toR, toC);
            selected = null;
            switchPlayer();
        }

        function executeJump(fromR, fromC, move) {
            board[move.r][move.c] = board[fromR][fromC];
            board[fromR][fromC] = null;
            board[move.captured.r][move.captured.c] = null;
            promoteKing(move.r, move.c);

            var nextJumps = getValidMoves(move.r, move.c).filter(function(m) { return m.isJump; });
            if (nextJumps.length > 0) {
                selected = { r: move.r, c: move.c };
                mustJump = true;
                jumpPiece = { r: move.r, c: move.c };
                renderBoard();
                return;
            }

            selected = null;
            mustJump = false;
            jumpPiece = null;
            switchPlayer();
        }

        function promoteKing(r, c) {
            var piece = board[r][c];
            if (piece && !piece.king) {
                if ((piece.color === 'black' && r === 0) || (piece.color === 'white' && r === 7)) {
                    piece.king = true;
                }
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            selected = null;

            var blackCount = 0, whiteCount = 0;
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++) {
                    if (board[r][c] && board[r][c].color === 'black') blackCount++;
                    if (board[r][c] && board[r][c].color === 'white') whiteCount++;
                }

            if (blackCount === 0) { showWinner('white'); return; }
            if (whiteCount === 0) { showWinner('black'); return; }

            var hasMove = false;
            for (var r = 0; r < ROWS && !hasMove; r++)
                for (var c = 0; c < COLS && !hasMove; c++)
                    if (board[r][c] && board[r][c].color === currentPlayer && getValidMoves(r, c).length > 0)
                        hasMove = true;

            if (!hasMove) {
                showWinner(currentPlayer === 'black' ? 'white' : 'black');
                return;
            }

            document.getElementById('status').textContent =
                (currentPlayer === 'black' ? '⚫ Siyah' : '⚪ Beyaz') + "'ın sırası";
            renderBoard();
        }

        function updateScore() {
            var black = 0, white = 0;
            for (var r = 0; r < ROWS; r++)
                for (var c = 0; c < COLS; c++) {
                    if (board[r][c] && board[r][c].color === 'black') black++;
                    if (board[r][c] && board[r][c].color === 'white') white++;
                }
            document.getElementById('p1-pieces').textContent = black + ' taş';
            document.getElementById('p2-pieces').textContent = white + ' taş';
            document.getElementById('p1-info').classList.toggle('active', currentPlayer === 'black');
            document.getElementById('p2-info').classList.toggle('active', currentPlayer === 'white');
        }

        function showWinner(color) {
            var name = color === 'black' ? '⚫ Siyah' : '⚪ Beyaz';
            document.getElementById('winner-text').textContent = '🏆 ' + name + ' Kazandı!';
            document.getElementById('winner-sub').textContent = 'Tebrikler!';
            document.getElementById('overlay').classList.add('show');
        }

        function resetGame() {
            initBoard();
            currentPlayer = 'black';
            selected = null;
            mustJump = false;
            jumpPiece = null;
            document.getElementById('status').textContent = "⚫ Siyah'ın sırası";
            document.getElementById('overlay').classList.remove('show');
            renderBoard();
        }

        resetGame();
    </script>
</body>
</html>
