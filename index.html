<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 GameKing - Mini Oyunlar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 20px;
        }
        h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .subtitle { font-size: 16px; opacity: 0.7; margin-bottom: 40px; }
        .games { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 500px; }
        .game-card {
            width: 200px; padding: 30px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: gold;
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }
        .game-card .icon { font-size: 48px; margin-bottom: 15px; }
        .game-card .name { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .game-card .desc { font-size: 12px; opacity: 0.7; }
        .footer { margin-top: 40px; font-size: 12px; opacity: 0.4; }
    </style>
</head>
<body>
    <h1>🎮 GameKing</h1>
    <p class="subtitle">Telegram Mini Oyunlar</p>
    <div class="games">
        <a class="game-card" href="./dama.html">
            <div class="icon">🎲</div>
            <div class="name">Dama</div>
            <div class="desc">Klasik strateji oyunu 2 kişilik</div>
        </a>
        <a class="game-card" href="./pingpong.html">
            <div class="icon">🏓</div>
            <div class="name">Ping Pong</div>
            <div class="desc">Hızlı aksiyon - AI veya 2 kişilik</div>
        </a>
    </div>
    <p class="footer">GameKing © 2026 | TON Blockchain</p>
</body>
</html>
