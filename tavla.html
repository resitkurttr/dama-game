<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 Tavla King</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:linear-gradient(135deg,#2c1810,#4a2c1a);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;color:white;padding:6px;gap:6px;user-select:none}
        h1{font-size:18px;text-shadow:0 0 15px rgba(210,180,120,0.5)}
        .mode-bar{display:flex;gap:3px;background:rgba(255,255,255,0.1);border-radius:14px;padding:2px}
        .mode-btn{padding:4px 10px;border:none;border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px}
        .mode-btn.active{background:rgba(255,215,0,0.3);color:#FFD700}
        .players{display:flex;justify-content:space-between;width:100%;max-width:440px;font-size:12px;padding:0 4px}
        .player{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.08)}
        .player.on{background:rgba(255,215,0,0.2);border:1px solid gold}
        #board{width:100%;max-width:440px;margin:4px auto}
        svg{width:100%;display:block}
        .dice-bar{display:flex;gap:8px;justify-content:center;padding:4px}
        .die{width:34px;height:34px;background:white;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#333}
        .die.off{opacity:0.25}
        .btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
        .btn{padding:7px 16px;font-size:12px;border:none;border-radius:12px;cursor:pointer;font-weight:bold}
        .g{background:linear-gradient(145deg,#FFD700,#FFA500);color:#1a1a2e}
        .r{background:linear-gradient(145deg,#f44336,#b71c1c);color:white}
        .gr{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white}
        .st{font-size:12px;padding:4px 12px;background:rgba(255,255,255,0.08);border-radius:10px;text-align:center}
        .ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        .ov.show{display:flex}
        .ov h2{font-size:22px;text-shadow:0 0 25px gold}
    </style>
</head>
<body>
    <h1>🎲 Tavla King</h1>
    <div class="mode-bar">
        <button class="mode-btn active" id="mAi">🤖 AI</button>
        <button class="mode-btn" id="m2p">👥 2 Kişi</button>
    </div>
    <div class="players">
        <div class="player on" id="p1"><span id="p1n">⚫ Sen</span> <span id="p1out" style="font-size:10px;opacity:0.7">Dış: 0</span></div>
        <div class="player" id="p2"><span id="p2n">⚪ AI</span> <span id="p2out" style="font-size:10px;opacity:0.7">Dış: 0</span></div>
    </div>
    <div id="board"><svg viewBox="0 0 500 320" id="svgBoard"></svg></div>
    <div class="dice-bar"><div class="die" id="d1">-</div><div class="die" id="d2">-</div></div>
    <div class="st" id="st">🎲 Zar at!</div>
    <div class="btns">
        <button class="btn g" id="bRoll">🎲 Zar At</button>
        <button class="btn gr" id="bNew">🔄 Yeni</button>
        <button class="btn r" id="bPass">⏭️ Pas</button>
    </div>
    <div class="ov" id="ov"><h2 id="wT"></h2><button class="btn gr" id="bAg">🔄 Tekrar</button></div>

<script>
(function(){
var cur=0,d=[0,0],du=[false,false],pts=[],sel=-1,rolled=false,mode='ai',aiGo=false;
var svg=document.getElementById('svgBoard');

function init(){
    cur=Math.random()>0.5?0:1;d=[0,0];du=[false,false];
    pts=[];
    for(var i=0;i<26;i++){pts.push(0);pts.push(0);}
    // Tavla dizilimi: Her oyuncu için 24 nokta
    // Oyuncu 0 (beyaz/AI): nokta 24'te 2, 13'te 5, 8'de 3, 6'de 5
    // Oyuncu 1 (siyah/Sen): nokta 1'de 2, 12'de 5, 17'de 3, 19'de 5
    setP(0,24,2);setP(0,13,5);setP(0,8,3);setP(0,6,5);
    setP(1,1,2);setP(1,12,5);setP(1,17,3);setP(1,19,5);
    sel=-1;rolled=false;aiGo=false;
    document.getElementById('d1').textContent='-';
    document.getElementById('d2').textContent='-';
    document.getElementById('d1').classList.remove('off');
    document.getElementById('d2').classList.remove('off');
    draw();updStatus();updPlayers();
    document.getElementById('ov').classList.remove('show');
    if(cur===1&&mode==='ai')aiStart();
}

function getP(p,i){return pts[p*25+i];}
function setP(p,i,v){pts[p*25+i]=v;}

function draw(){
    svg.innerHTML='';
    // Arka plan
    add(svg,'rect',{x:0,y:0,width:500,height:320,fill:'#3d2817',rx:8});
    add(svg,'rect',{x:4,y:4,width:492,height:312,fill:'#654321',rx:6,stroke:'#8B4513',strokeWidth:2});

    // 24 nokta (+ bar)
    for(var i=1;i<=24;i++){
        var px=nx(i),top=i>=13;
        var c=i%2===0?'#c0392b':'#ecf0f1';
        if(top){
            add(svg,'polygon',{points:px+',14 '+(px-16)+',150 '+(px+16)+',150',fill:c,opacity:0.85});
        }else{
            add(svg,'polygon',{points:px+',306 '+(px-16)+',170 '+(px+16)+',170',fill:c,opacity:0.85});
        }
        // Nokta numarası
        var ty=top?10:316;
        add(svg,'text',{x:px,y:ty,textAnchor:'middle',fill:'rgba(255,255,255,0.3)',fontSize:7},String(i));

        // Taşları çiz
        drawStones(i,px,top);
    }

    // Bar (orta çizgi)
    add(svg,'rect',{x:242,y:4,width:16,height:312,fill:'#4a3525'});

    // Seçili nokta vurgusu
    if(sel>0){
        var sx=nx(sel);
        var sy=sel>=13?12:168;
        add(svg,'rect',{x:sx-18,y:sy,width:36,height:140,fill:'none',stroke:'#FFD700',strokeWidth:3,rx:4,opacity:0.8});
    }

    // Dışarı (borne) taşları
    drawBorne(0,470,80);
    drawBorne(1,470,240);

    // Ev (bar) alanı
    add(svg,'rect',{x:215,y:135,width:70,height:50,fill:'#2a1a10',rx:4,stroke:'#FFD700',strokeWidth:1,opacity:0.5});
    var t0=getP(0,25);
    if(t0>0){
        add(svg,'circle',{cx:250,cy:155,r:10,fill:'#f0e6d0',stroke:'#c4a882',strokeWidth:1.5});
        if(t0>1)add(svg,'text',{x:250,y:159,textAnchor:'middle',fill:'#333',fontSize:9,fontWeight:'bold'},String(t0));
    }
}

function drawStones(point,px,top){
    var c0=getP(0,point),c1=getP(1,point);
    var total=c0+c1;
    if(total===0)return;

    var startY,dir;
    if(top){startY=22;dir=1;}
    else{startY=298;dir=-1;}

    // Siyah taşlar (oyuncu 1)
    for(var j=0;j<c1;j++){
        var cy=startY+dir*j*21;
        add(svg,'circle',{cx:px,cy:cy,r:9,fill:'#1a1a1a',stroke:'#555',strokeWidth:1.5});
        if(c1>5&&j===Math.floor(c1/2)){
            add(svg,'text',{x:px,y:cy+3,textAnchor:'middle',fill:'#FFD700',fontSize:8,fontWeight:'bold'},String(c1));
        }
    }
    // Beyaz taşlar (oyuncu 0) - sadece çoklu noktalarda
    for(var j=0;j<c0;j++){
        var cy=startY+dir*(c1+j)*21;
        add(svg,'circle',{cx:px,cy:cy,r:9,fill:'#f5f0e8',stroke:'#c4a882',strokeWidth:1.5});
        if(c0>5&&j===Math.floor(c0/2)){
            add(svg,'text',{x:px,y:cy+3,textAnchor:'middle',fill:'#333',fontSize:8,fontWeight:'bold'},String(c0));
        }
    }
}

function drawBorne(p,cx,cy){
    var cnt=getP(p,25);
    if(cnt===0)return;
    add(svg,'rect',{x:cx-18,y:cy-45,width:36,height:90,fill:'#2a1a10',rx:4,stroke:'#555',strokeWidth:1});
    var color=p===0?'#f5f0e8':'#1a1a1a';
    var stroke=p===0?'#c4a882':'#555';
    for(var j=0;j<Math.min(cnt,5);j++){
        add(svg,'circle',{cx:cx,cy:cy-30+j*15,r:6,fill:color,stroke:stroke,strokeWidth:1});
    }
    if(cnt>5)add(svg,'text',{x:cx,y:cy+38,textAnchor:'middle',fill:'#FFD700',fontSize:9,fontWeight:'bold'},String(cnt));
}

function nx(i){return i<=12?468-(i-1)*20:32+(i-13)*20+8;}

function add(tag,attrs,text){
    var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(var k in attrs)el.setAttribute(k,attrs[k]);
    if(text!==undefined)el.textContent=text;
    svg.appendChild(el);
    return el;
}

function getDice(){var v=[];if(!du[0])v.push(d[0]);if(!du[1])v.push(d[1]);return v;}

function canMove(p,pt){
    if(getP(p,pt)<=0)return false;
    var dv=getDice();
    for(var i=0;i<dv.length;i++){
        var tgt=p===0?pt-dv[i]:pt+dv[i];
        if(tgt===0||tgt===25)return true;
        if(tgt>0&&tgt<25&&getP(p,tgt)<=1)return true;
    }
    return false;
}

function roll(){
    if(rolled||aiGo)return;
    d[0]=1+Math.floor(Math.random()*6);
    d[1]=1+Math.floor(Math.random()*6);
    du=[false,false];
    document.getElementById('d1').textContent=d[0];
    document.getElementById('d2').textContent=d[1];
    document.getElementById('d1').classList.remove('off');
    document.getElementById('d2').classList.remove('off');
    rolled=true;sel=-1;draw();
    updStatus(cur===0?'Taş seç!':'AI düşünüyor...');
    if(cur===1&&mode==='ai')aiGo=true;
}

function tap(pt){
    if(!rolled||aiGo)return;
    if(sel>0){
        var dv=getDice();
        for(var i=0;i<dv.length;i++){
            var tgt=cur===0?sel-dv[i]:sel+dv[i];
            if(tgt===pt&&(tgt===0||tgt===25||getP(cur,tgt)<=1)){
                movePiece(sel,tgt);return;
            }
        }
        if(pt===sel){sel=-1;draw();return;}
    }
    if(getP(cur,pt)>0&&canMove(cur,pt)){sel=pt;draw();}
}

function movePiece(from,to){
    setP(cur,from,getP(cur,from)-1);
    if(to===0||to===25)setP(cur,to,getP(cur,to)+1);
    else setP(cur,to,getP(cur,to)+1);

    // Rakip taşı yeme
    if(to>0&&to<25){
        var opp=cur===0?1:0;
        if(getP(opp,to)===1&&getP(cur,to)>1){
            setP(opp,to,0);setP(cur,to,1);setP(opp,25,getP(opp,25)+1);
        }
    }

    var diff=cur===0?(from-to):(to-from);
    for(var i=0;i<2;i++){if(!du[i]&&d[i]===diff){du[i]=true;break;}}
    document.getElementById('d1').classList.toggle('off',du[0]);
    document.getElementById('d2').classList.toggle('off',du[1]);
    sel=-1;draw();

    // Kazanma kontrolü
    if(getP(cur,25)>=15){
        document.getElementById('wT').textContent='🏆 '+(cur===0?'Sen':'AI')+' Kazandı!';
        document.getElementById('ov').classList.add('show');return;
    }
    if(du[0]&&du[1])nextTurn();
    else updStatus('Taş taşı!');
}

function nextTurn(){
    cur=cur===0?1:0;d=[0,0];du=[false,false];rolled=false;sel=-1;
    document.getElementById('d1').textContent='-';
    document.getElementById('d2').textContent='-';
    document.getElementById('d1').classList.remove('off');
    document.getElementById('d2').classList.remove('off');
    draw();updPlayers();
    if(cur===0)updStatus('Sıran - Zar at!');
    else if(mode==='ai'){updStatus('AI düşünüyor...');aiStart();}
    else updStatus('Oyuncu 2 - Zar at!');
}

function updPlayers(){
    document.getElementById('p1').classList.toggle('on',cur===0);
    document.getElementById('p2').classList.toggle('on',cur===1);
    document.getElementById('p1out').textContent='Dış: '+getP(0,25);
    document.getElementById('p2out').textContent='Dış: '+getP(1,25);
}
function updStatus(m){document.getElementById('st').textContent=m;}

// ─── AI ───
function aiStart(){
    aiGo=true;
    setTimeout(function(){
        d[0]=1+Math.floor(Math.random()*6);
        d[1]=1+Math.floor(Math.random()*6);
        du=[false,false];
        document.getElementById('d1').textContent=d[0];
        document.getElementById('d2').textContent=d[1);
        rolled=true;draw();
        aiStep();
    },500);
}

function aiStep(){
    var best=-1,bestSc=-99,bestD=0;
    for(var pt=1;pt<=24;pt++){
        if(getP(1,pt)<=0)continue;
        var dv=getDice();
        for(var di=0;di<dv.length;di++){
            var tgt=1+dv[di];
            if(pt+dv[di]>25)continue;
            tgt=pt+dv[di];
            if(tgt<=0||tgt>25)continue;
            if(tgt<25&&getP(1,tgt)>1)continue;
            var sc=0;
            if(getP(1,tgt)===0)sc+=2;
            if(tgt>=19)sc+=3;
            if(tgt===25)sc+=10;
            if(getP(0,tgt)===1)sc+=4; // rakip taşını ye
            if(sc>bestSc){bestSc=sc;best=pt;bestD=di;}
        }
    }
    if(best>=0){
        var dv=getDice();
        var tgt=1+dv[bestD];
        movePiece(best,tgt);
        if(!du[0]&&!du[1])setTimeout(aiStep,400);
        else aiGo=false;
    }else{
        du=[true,true];
        document.getElementById('d1').classList.add('off');
        document.getElementById('d2').classList.add('off');
        aiGo=false;nextTurn();
    }
}

// ─── Events ───
document.getElementById('bRoll').addEventListener('click',roll);
document.getElementById('bNew').addEventListener('click',init);
document.getElementById('bAg').addEventListener('click',init);
document.getElementById('bPass').addEventListener('click',function(){if(rolled&&!aiGo)nextTurn();});
document.getElementById('mAi').addEventListener('click',function(){mode='ai';document.getElementById('mAi').classList.add('active');document.getElementById('m2p').classList.remove('active');init();});
document.getElementById('m2p').addEventListener('click',function(){mode='2p';document.getElementById('m2p').classList.add('active');document.getElementById('mAi').classList.remove('active');init();});

svg.addEventListener('click',function(e){
    if(aiGo)return;
    var r=svg.getBoundingClientRect();
    var mx=(e.clientX-r.left)/(r.width)*500;
    for(var i=1;i<=24;i++){if(Math.abs(mx-nx(i))<16){tap(i);return;}}
});

init();
})();
</script>
</body>
</html>
