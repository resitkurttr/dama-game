<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🌾 Mangala PvP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a2a;font-family:sans-serif;color:#fff}
body{display:flex;flex-direction:column}
#hdr{display:flex;justify-content:center;gap:6px;padding:6px;background:#111;flex-shrink:0}
#hdr button{padding:5px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:#222;color:#aaa}
#hdr button.on{background:#FFD700;color:#000}
#info{display:flex;justify-content:space-between;padding:3px 10px;font-size:13px;background:#111;flex-shrink:0}
#info .me{color:#FF5722;font-weight:bold}
#info .opp{color:#4CAF50;font-weight:bold}
#game{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:20px 10px}
#board{width:100%;max-width:400px;background:linear-gradient(135deg,#8B4513,#654321);border-radius:14px;padding:8px;display:flex;flex-direction:column;justify-content:space-between;border:3px solid #a0522d;box-shadow:0 8px 25px rgba(0,0,0,0.5)}
.board-row{display:flex;gap:4px;align-items:center;justify-content:center}
.row{display:flex;gap:4px;justify-content:center}
.pit{flex:1;aspect-ratio:1;max-width:48px;min-width:28px;background:radial-gradient(circle,#2d1a0e,#1a0f08);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #4a3020;transition:all 0.2s}
.pit:active{transform:scale(0.95)}
.pit.sel{border-color:#4CAF50;box-shadow:0 0 10px #4CAF50}
.pit .count{font-size:14px;font-weight:bold}
.store{width:48px;max-width:56px;background:radial-gradient(circle,#3d2a1a,#1a0f08);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid #6a4a30;min-width:38px}
.store .count{font-size:20px;font-weight:bold;color:#FFD700}
.store .label{font-size:10px;opacity:0.5}
#ctl{display:flex;justify-content:center;gap:8px;padding:8px;background:#111;flex-shrink:0}
#ctl button{padding:8px 20px;border:none;border-radius:14px;font-size:13px;cursor:pointer;font-weight:bold}
#ctl .g{background:#4CAF50;color:#fff}
#ctl .g.waiting{background:#FF9800}
#ctl .r{background:#f44336;color:#fff}
#ctl .y{background:#FFD700;color:#000}
#msg{text-align:center;padding:2px;font-size:12px;color:#888;background:#0a0a1a;flex-shrink:0}
#status{text-align:center;padding:4px;font-size:11px;color:#4CAF50;background:#111;flex-shrink:0}
.win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.win.show{display:flex}
.win h2{font-size:22px}
.win button{padding:10px 24px;border:none;border-radius:10px;background:#4CAF50;color:#fff;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div id="hdr">
  <button class="on" id="mAi">🤖 AI</button>
  <button id="mPvP">🌐 PvP Online</button>
</div>
<div id="info"><span id="p1" class="me">⚫ Sen</span><span id="p2" class="opp">⚪ AI</span></div>
<div id="game">
  <div id="board">
    <div class="board-row" style="flex-direction:row-reverse;">
      <div class="store" id="store1"><div class="count" id="sv1">0</div><div class="label">Rakip</div></div>
      <div class="row" id="row1"></div>
    </div>
    <div class="board-row">
      <div class="store" id="store0"><div class="count" id="sv0">0</div><div class="label">Sen</div></div>
      <div class="row" id="row0"></div>
    </div>
  </div>
</div>
<div id="status">AI modu — Delik seç</div>
<div id="msg">Kendi deliklerinden birini seç</div>
<div id="ctl">
  <button class="g" id="bNew">🔄 Yeni Oyun</button>
  <button class="r" id="btnUndo">↩️ Geri Al</button>
</div>
<div class="win" id="win"><h2 id="wT"></h2><button id="bR2">🔄 Tekrar</button></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<script src="supabase-integration.js"></script>
<script>
// ════════════════════════════════════════════════
//  MANGALA PvP — Supabase Realtime Multiplayer
// ════════════════════════════════════════════════
var G={
  pits:[], stores:[0,0], currentPlayer:1, history:[],
  gameMode:'ai', aiThinking:false,
  // PvP state
  pvp:false, gameId:null, myPlayerNum:null, opponentId:null,
  myColor:null, // 0 or 1
  connected:false, syncPending:false
};

function init(){
  initGame();
  bindUI();
  initSupabase();
}

function initGame(){
  G.pits=[[4,4,4,4,4,4],[4,4,4,4,4,4]];
  G.stores=[0,0]; G.currentPlayer=1; G.history=[]; G.aiThinking=false;
  render(); updateStatus('⚫ Sen - Bir deliğe tıkla!');
  document.getElementById('win').classList.remove('show');
  if(G.currentPlayer===0 && G.gameMode==='ai') runAI();
}

function saveState(){
  G.history.push({pits:[G.pits[0].slice(),G.pits[1].slice()], stores:G.stores.slice(), player:G.currentPlayer});
  if(G.history.length>30) G.history.shift();
}

function render(){
  var r0=document.getElementById('row0'), r1=document.getElementById('row1');
  r0.innerHTML=''; r1.innerHTML='';
  // Player 1 (top row, reversed)
  for(var i=5;i>=0;i--) r1.appendChild(createPit(1,i));
  // Player 0 (bottom row)
  for(var i=0;i<6;i++) r0.appendChild(createPit(0,i));
  document.getElementById('sv0').textContent=G.stores[0];
  document.getElementById('sv1').textContent=G.stores[1];
  document.getElementById('p1').textContent=(G.myColor===1?'⚫ Sen':'⚪ Rakip');
  document.getElementById('p2').textContent=(G.myColor===0?'⚫ Sen':'⚪ Rakip');
  document.getElementById('p1').className=(G.currentPlayer===1?'me':'opp');
  document.getElementById('p2').className=(G.currentPlayer===0?'me':'opp');
}

function createPit(player,index){
  var el=document.createElement('div'); el.className='pit';
  el.innerHTML='<div class="count">'+G.pits[player][index]+'</div>';
  (function(p,i){ el.addEventListener('click',function(e){ e.preventDefault(); onPitClick(p,i); }); })(player,index);
  return el;
}

function onPitClick(player,index){
  if(player!==G.currentPlayer || G.aiThinking) return;
  if(G.pvp && player!==G.myColor) return;
  if(G.pits[player][index]===0) return;
  saveState();
  doMove(player,index);
  render();
  if(checkWin()) return;
  if(G.currentPlayer===0 && G.gameMode==='ai') runAI();
}

function doMove(player,index){
  var count=G.pits[player][index]; G.pits[player][index]=0;
  var cur=index, row=player;
  for(var s=0;s<count;s++){
    cur++;
    if(cur>=6){
      if(row===player && cur===6){ G.stores[player]++; cur=-1; row=row===0?1:0; continue; }
      row=row===0?1:0; cur=0;
    }
    G.pits[row][cur]++;
  }
  // Last piece in own empty pit → capture
  if(row===player && G.pits[row][cur]===1 && cur>=0 && cur<6){
    var opp=5-cur;
    if(G.pits[player][opp]>0){
      var captured=G.pits[player][opp]+1;
      G.pits[player][opp]=0; G.pits[player][cur]=0;
      G.stores[player]+=captured;
    }
  }
  if(G.pvp) sendState({pits:G.pits, stores:G.stores, currentPlayer:G.currentPlayer});
}

function checkWin(){
  var t0=0, t1=0;
  for(var i=0;i<6;i++){ t0+=G.pits[0][i]; t1+=G.pits[1][i]; }
  if(t0===0 || t1===0){
    G.stores[0]+=t0; G.stores[1]+=t1;
    for(var i=0;i<6;i++){ G.pits[0][i]=0; G.pits[1][i]=0; }
    render();
    var winner=G.stores[1]>G.stores[0]?'⚫ Sen':'⚪ AI';
    if(G.pvp) winner=G.stores[G.myColor]>G.stores[1-G.myColor]?'Sen':'Rakip';
    if(G.stores[0]===G.stores[1]) winner='Berabere';
    document.getElementById('wT').textContent='🏆 '+winner+' Kazandı! ('+G.stores[1]+'-'+G.stores[0]+')';
    document.getElementById('win').classList.add('show');
    if(G.pvp && G.gameId && window.TontonSupabase){
      var winnerId = winner==='Sen'?G.config.userId:G.opponentId;
      window.TontonSupabase.endGame(G.gameId, winnerId, {player1:G.stores[0], player2:G.stores[1]});
    }
    return true;
  }
  return false;
}

function undoMove(){
  if(G.history.length===0 || G.aiThinking) return;
  var prev=G.history.pop();
  G.pits=[prev.pits[0].slice(), prev.pits[1].slice()];
  G.stores=prev.stores.slice(); G.currentPlayer=prev.player;
  render(); updateStatus('Geri alındı - '+(G.currentPlayer===1?'⚫ Sıran':'⚪ AI düşünüyor...'));
  if(G.currentPlayer===0 && G.gameMode==='ai') runAI();
}

function updateStatus(msg){ document.getElementById('status').textContent=msg; }

// ═══ AI ═══
function runAI(){
  G.aiThinking=true; updateStatus('⚪ AI düşünüyor...');
  setTimeout(function(){ aiDecide(); },600);
}

function aiDecide(){
  var best=-1, bestScore=-99;
  for(var i=0;i<6;i++){
    if(G.pits[0][i]===0) continue;
    var sc=0, count=G.pits[0][i];
    // Simulate
    var testPits=[G.pits[0].slice(), G.pits[1].slice()]; var testStores=G.stores.slice();
    var cur=i, row=0;
    for(var s=0;s<count;s++){ cur++; if(cur>=6){ if(row===0&&cur===6){ testStores[0]++; cur=-1; row=1; continue; } row=1-row; cur=0; } testPits[row][cur]++; }
    // Capture bonus
    if(row===0 && testPits[0][cur]===1 && cur>=0 && cur<6){
      var opp=5-cur;
      if(testPits[0][opp]>0) sc+=testPits[0][opp]+1;
    }
    // Store bonus
    if(cur===6 || row===0) sc+=3;
    // Empty opponent pits
    sc+=G.pits[0][i]*0.2;
    // Close to home
    if(i>=4) sc+=2;
    if(sc>bestScore){ bestScore=sc; best=i; }
  }
  if(best>=0){
    saveState(); doMove(0,best); render();
    if(!checkWin()){ G.currentPlayer=1; G.aiThinking=false; updateStatus('⚫ Sen - Sıran!'); }
    else G.aiThinking=false;
  }else{
    G.currentPlayer=1; G.aiThinking=false; updateStatus('⚫ Sen - Sıran!');
  }
}

// ═══ SUPABASE PvP ═══
function initSupabase(){
  if(!window.TontonSupabase) return;
  window.TontonSupabase.init({});
  var tgId=697527694+Math.floor(Math.random()*1000);
  window.TontonSupabase.registerUser(tgId, 'player_'+tgId, 'Oyuncu '+tgId).then(function(user){
    if(user) G.config={userId:user.id};
    console.log('[PvP] User ready:', user?.id);
  });
}

function findPvPMatch(){
  if(!window.TontonSupabase || !G.config?.userId) return;
  window.TontonSupabase.findMatch('mangala').then(function(result){
    if(!result) return;
    if(result.status==='waiting'){
      updateStatus('Rakip bekleniyor...');
      document.getElementById('bNew').classList.add('waiting');
      document.getElementById('bNew').disabled=true;
    }else if(result.status==='matched' && result.game){
      onGameMatched(result.game);
    }
  });
}

function onGameMatched(game){
  G.gameId=game.id;
  G.myPlayerNum=game.player1_id===G.config.userId?0:1;
  G.opponentId=G.myPlayerNum===0?game.player2_id:game.player1_id;
  G.myColor=G.myPlayerNum;
  G.currentPlayer=1; // Player 1 (bottom) starts
  
  updateStatus('Oyun başladı! Sen '+(G.myColor===1?'⚫ (alt)':'⚪ (üst)'));
  document.getElementById('bNew').classList.remove('waiting');
  document.getElementById('bNew').disabled=false;
  updateStatus(G.myColor===1?'⚫ Sıran - Delik seç':'Rakip oynuyor...');
  
  window.TontonSupabase.subscribeToGame(G.gameId, onGameStateUpdate);
}

function onGameStateUpdate(payload){
  if(!payload || !payload.state) return;
  var state=typeof payload.state==='string'?JSON.parse(payload.state):payload.state;
  if(state.pits) G.pits=state.pits;
  if(state.stores) G.stores=state.stores;
  if(state.currentPlayer!==undefined) G.currentPlayer=state.currentPlayer;
  render();
  var isMyTurn = G.currentPlayer===G.myColor;
  updateStatus(isMyTurn?'⚫ Sıran - Delik seç':'Rakip oynuyor...');
}

function sendState(update){
  if(!G.pvp || !G.gameId || !window.TontonSupabase) return;
  if(G.syncPending) return;
  G.syncPending=true;
  var fullState={pits:G.pits, stores:G.stores, currentPlayer:G.currentPlayer};
  Object.assign(fullState, update);
  window.TontonSupabase.updateGameState(G.gameId, fullState).then(function(){
    G.syncPending=false;
  });
}

function leaveGame(){
  if(G.gameId && window.TontonSupabase) window.TontonSupabase.unsubscribeFromGame();
  G.gameId=null; G.myPlayerNum=null; G.opponentId=null; G.pvp=false; G.myColor=null;
}

function bindUI(){
  document.getElementById('bNew').onclick=function(){ if(G.pvp) findPvPMatch(); else initGame(); };
  document.getElementById('bR2').onclick=initGame;
  document.getElementById('btnUndo').onclick=undoMove;
  
  document.getElementById('mAi').onclick=function(){
    G.gameMode='ai'; G.pvp=false;
    this.classList.add('on'); document.getElementById('mPvP').classList.remove('on');
    initGame();
  };
  
  document.getElementById('mPvP').onclick=function(){
    if(!window.TontonSupabase || !window.TontonSupabase.isConnected()){
      updateStatus('Supabase bağlı değil'); return;
    }
    G.gameMode='pvp'; G.pvp=true;
    this.classList.add('on'); document.getElementById('mAi').classList.remove('on');
    updateStatus('Eşleşme aranıyor...');
    findPvPMatch();
  };
}

// START
init();
</script>
</body>
</html>
