<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<title data-i18n="pingpong.title">Ping Pong</title>
<script src="i18n.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:sans-serif;color:#fff}
body{display:flex;flex-direction:column}
#hdr{display:flex;justify-content:center;gap:6px;padding:6px;background:#111;flex-shrink:0;align-items:center}
#hdr button{padding:5px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:#222;color:#aaa;font-family:inherit}
#hdr button.on{background:#FFD700;color:#000}
#hdr .lang-btn{padding:5px 8px;font-size:11px;background:#1a1a2e;color:#FFD700;border:1px solid rgba(255,215,0,0.3)}
#scr{display:flex;justify-content:center;gap:12px;padding:4px;background:#111;flex-shrink:0;font-size:14px;font-weight:bold}
#scr span{padding:2px 12px;border-radius:6px;background:#1a1a2e}
#scr .me{color:#FF5722}
#scr .ai{color:#2196F3}
#game{flex:1;position:relative;overflow:hidden}
#game canvas{display:block;width:100%;height:100%}
#ctl{display:flex;justify-content:center;gap:8px;padding:8px;background:#111;flex-shrink:0}
#ctl button{min-width:60px;height:44px;border:none;border-radius:10px;font-size:18px;cursor:pointer;font-family:inherit}
#ctl .bl{background:#e91e63;color:#fff}
#ctl .br{background:#2196f3;color:#fff}
#ctl .bs{background:#4CAF50;color:#fff;flex:1;max-width:140px;font-size:14px;font-weight:600}
#msg{text-align:center;padding:2px;font-size:12px;color:#888;background:#0a0a1a;flex-shrink:0}
.win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.win.show{display:flex}
.win h2{font-size:22px}
.win button{padding:10px 24px;border:none;border-radius:10px;background:#4CAF50;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="hdr">
  <button class="on" id="mAi">🤖 <span data-i18n="mode.ai">AI</span></button>
  <button id="m2p">👥 <span data-i18n="mode.2p">2 Kişilik</span></button>
  <button class="lang-btn" id="langBtn">🌐</button>
</div>
<div id="scr"><span class="me" data-i18n="score.you">Sen: 0</span><span class="ai" data-i18n="score.opponent">Rakip: 0</span></div>
<div id="game"></div>
<div id="ctl">
  <button class="bl" id="bL">◀</button>
  <button class="bs" id="bS" data-i18n="btn.servis">▶ SERVİS</button>
  <button class="br" id="bR">▶</button>
</div>
<div id="msg" data-i18n="msg.press_serve">Servis atmak için butona bas</div>
<div class="win" id="win"><h2 id="wT"></h2><button id="bR2"><span data-i18n="btn.retry">🔄 Tekrar</span></button></div>

<script>
// ════════════════════════════════════════════════
//  PING PONG - 2D (NO THREE.JS) - I18N READY
// ════════════════════════════════════════════════
var G={
  W:0, H:0,
  scores:[0,0], win:5,
  ai:true, serving:true, server:0,
  bx:0, by:0, bvx:0, bvy:0, br:8,
  p1x:0, p2x:0,
  padW:90, padH:14,
  lHeld:false, rHeld:false,
  cvs:null, cx:null, raf:null
};

function init(){
  var box=document.getElementById('game');
  G.cvs=document.createElement('canvas');
  box.appendChild(G.cvs);
  G.cx=G.cvs.getContext('2d');
  resize();
  resetBall();
  loop();
  i18n.applyDOM();
}

function resize(){
  var box=document.getElementById('game');
  G.W=box.clientWidth;
  G.H=box.clientHeight;
  G.cvs.width=G.W;
  G.cvs.height=G.H;
  G.padW=Math.min(100,G.W*0.16);
  G.p1x=G.W/2;
  G.p2x=G.W/2;
}

function resetBall(){
  G.bx=G.W/2;
  G.by=G.H/2;
  G.bvx=0;
  G.bvy=0;
  G.p1x=G.W/2;
  G.p2x=G.W/2;
}

function serve(){
  if(!G.serving)return;
  G.serving=false;
  var dir=G.server===0?-1:1;
  G.bvx=(Math.random()-0.5)*2;
  G.bvy=dir*(2+Math.random()*1.5);
  setMsg(G.server===0?i18n.t('msg.you_served'):i18n.t('msg.opp_serving'));
}

function physics(){
  if(G.serving)return;
  var padY1=G.H-30;
  var padY2=30;
  G.bx+=G.bvx;
  G.by+=G.bvy;
  if(G.bx-G.br<0){G.bx=G.br;G.bvx=Math.abs(G.bvx);}
  if(G.bx+G.br>G.W){G.bx=G.W-G.br;G.bvx=-Math.abs(G.bvx);}
  if(G.bvy>0 && G.by+G.br>=padY1-G.padH/2 && G.by-G.br<=padY1+G.padH/2){
    if(Math.abs(G.bx-G.p1x)<G.padW/2+G.br){
      G.by=padY1-G.padH/2-G.br;
      G.bvy=-Math.abs(G.bvy)*1.05;
      G.bvx+=(G.bx-G.p1x)*0.12;
    }
  }
  if(G.bvy<0 && G.by-G.br<=padY2+G.padH/2 && G.by+G.br>=padY2-G.padH/2){
    if(Math.abs(G.bx-G.p2x)<G.padW/2+G.br){
      G.by=padY2+G.padH/2+G.br;
      G.bvy=Math.abs(G.bvy)*1.05;
      G.bvx+=(G.bx-G.p2x)*0.12;
    }
  }
  G.bvx=Math.max(-8,Math.min(8,G.bvx));
  G.bvy=Math.max(-8,Math.min(8,G.bvy));
  if(G.by>G.H+20) score(1);
  if(G.by<-20) score(0);
}

function score(who){
  G.scores[who]++;
  updateScr();
  G.serving=true;
  G.server=who===0?1:0;
  resetBall();
  if(G.scores[who]>=G.win){showWin(who);return;}
  setMsg(G.server===0?i18n.t('msg.you_served'):i18n.t('msg.opp_serving'));
  if(G.ai && G.server===1){
    setTimeout(serve,600);
  }
}

function aiMove(){
  if(!G.ai||G.serving)return;
  var tx=G.bx+(Math.sin(Date.now()*0.003)*10);
  var d=tx-G.p2x;
  G.p2x+=Math.max(-5,Math.min(5,d*0.08));
}

function input(){
  var sp=5;
  if(G.lHeld)G.p1x=Math.max(G.padW/2,G.p1x-sp);
  if(G.rHeld)G.p1x=Math.min(G.W-G.padW/2,G.p1x+sp);
  aiMove();
}

function draw(){
  var c=G.cx,w=G.W,h=G.H;
  c.fillStyle='#0d1b2a';c.fillRect(0,0,w,h);
  c.fillStyle='#1565C0';
  c.fillRect(10,10,w-20,h-20);
  c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=2;
  c.setLineDash([6,4]);
  c.beginPath();c.moveTo(w/2,10);c.lineTo(w/2,h-10);c.stroke();
  c.beginPath();c.moveTo(10,h/2);c.lineTo(w-10,h/2);c.stroke();
  c.setLineDash([]);
  c.fillStyle='#FF5722';
  c.shadowColor='#FF5722';c.shadowBlur=10;
  roundRect(c,G.p1x-G.padW/2,h-30-G.padH/2,G.padW,G.padH,6);
  c.fill();c.shadowBlur=0;
  c.fillStyle='#2196F3';
  c.shadowColor='#2196F3';c.shadowBlur=10;
  roundRect(c,G.p2x-G.padW/2,30-G.padH/2,G.padW,G.padH,6);
  c.fill();c.shadowBlur=0;
  if(!G.serving){
    c.fillStyle='#FFD700';
    c.shadowColor='#FFD700';c.shadowBlur=15;
    c.beginPath();c.arc(G.bx,G.by,G.br,0,Math.PI*2);c.fill();
    c.shadowBlur=0;
  } else {
    c.fillStyle='rgba(255,215,0,0.3)';
    c.beginPath();c.arc(G.W/2,G.H/2,G.br,0,Math.PI*2);c.fill();
  }
  c.fillStyle='rgba(255,255,255,0.4)';c.font='10px sans-serif';c.textAlign='center';
  c.fillText(G.ai?(i18n.t('player.ai')||'AI'):i18n.t('player.player2'),w/2,25);
  c.fillText(i18n.t('player.you'),w/2,h-18);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function loop(){
  input();
  physics();
  draw();
  G.raf=requestAnimationFrame(loop);
}

function updateScr(){
  var sp=document.querySelectorAll('#scr span');
  sp[0].textContent=i18n.format('score.you', G.scores[0]);
  sp[1].textContent=(G.ai?i18n.format('score.opponent',G.scores[1]):i18n.format('score.player2',G.scores[1]));
}
function setMsg(t){document.getElementById('msg').textContent=t;}
function showWin(who){
  var s1=G.scores[0], s2=G.scores[1];
  document.getElementById('wT').textContent=(who===0?i18n.format('score.you_win',s1,s2):i18n.format('score.opponent_wins',s1,s2));
  document.getElementById('win').classList.add('show');
}

function resetGame(){
  G.scores=[0,0];G.serving=true;G.server=0;
  resetBall();updateScr();setMsg(i18n.t('msg.press_serve'));
  document.getElementById('win').classList.remove('show');
}

// Dil degistirme butonu
function toggleLang(){
  var cur = i18n.getLocale();
  var next = cur === 'tr' ? 'en' : 'tr';
  i18n.setLocale(next);
  updateScr();
  if (G.serving) setMsg(i18n.t('msg.press_serve'));
}

// Locale degisiklik event'i
window.addEventListener('tonton:localechange', function(e) {
  updateScr();
  if (G.serving) setMsg(i18n.t('msg.press_serve'));
});

// Input
document.getElementById('bL').onmousedown=function(){G.lHeld=true;};
document.getElementById('bL').onmouseup=function(){G.lHeld=false;};
document.getElementById('bL').ontouchstart=function(e){e.preventDefault();G.lHeld=true;};
document.getElementById('bL').ontouchend=function(e){e.preventDefault();G.lHeld=false;};
document.getElementById('bR').onmousedown=function(){G.rHeld=true;};
document.getElementById('bR').onmouseup=function(){G.rHeld=false;};
document.getElementById('bR').ontouchstart=function(e){e.preventDefault();G.rHeld=true;};
document.getElementById('bR').ontouchend=function(e){e.preventDefault();G.rHeld=false;};
document.onmouseup=function(){G.lHeld=false;G.rHeld=false;};
document.addEventListener('keyup',function(){G.lHeld=false;G.rHeld=false;});
document.getElementById('bS').onclick=serve;
document.getElementById('langBtn').onclick=toggleLang;

var tx0=0;
document.getElementById('game').ontouchstart=function(e){tx0=e.touches[0].clientX;e.preventDefault();};
document.getElementById('game').ontouchmove=function(e){
  e.preventDefault();
  var dx=e.touches[0].clientX-tx0;
  G.p1x=Math.max(G.padW/2,Math.min(G.W-G.padW/2,G.p1x+dx*2));
  tx0=e.touches[0].clientX;
};

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')G.lHeld=true;
  if(e.key==='ArrowRight'||e.key==='d')G.rHeld=true;
  if(e.key===' '||e.key==='Enter')serve();
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')G.lHeld=false;
  if(e.key==='ArrowRight'||e.key==='d')G.rHeld=false;
});

document.getElementById('mAi').onclick=function(){G.ai=true;this.classList.add('on');document.getElementById('m2p').classList.remove('on');resetGame();};
document.getElementById('m2p').onclick=function(){G.ai=false;this.classList.add('on');document.getElementById('mAi').classList.remove('on');resetGame();};
document.getElementById('bR2').onclick=resetGame;
window.onresize=resize;

init();
</script>

    <script src="tonconnect-ui.min.js"></script>
    <script src="wallet-bar.js"></script>
</body>
</html>
