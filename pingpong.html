<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏓 Ping Pong King</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;color:white;user-select:none;overflow:hidden}
        #topBar{width:100%;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.5);z-index:10}
        #topBar h1{font-size:16px}
        .mode-bar{display:flex;gap:3px;background:rgba(255,255,255,0.1);border-radius:16px;padding:2px}
        .mode-btn{padding:4px 10px;border:none;border-radius:14px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px}
        .mode-btn.active{background:rgba(255,215,0,0.3);color:#FFD700}
        .view-bar{display:flex;gap:3px;background:rgba(255,255,255,0.1);border-radius:16px;padding:2px}
        .view-btn{padding:4px 10px;border:none;border-radius:14px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px}
        .view-btn.active{background:rgba(0,180,255,0.3);color:#00B4FF}
        #scoreBar{display:flex;justify-content:center;gap:12px;padding:4px;font-size:14px}
        .score{padding:4px 12px;border-radius:8px;background:rgba(255,255,255,0.08)}
        .score.active{background:rgba(255,215,0,0.2);border:1px solid gold}
        #gameContainer{flex:1;width:100%;position:relative;touch-action:none}
        #gameContainer canvas{width:100%!important;height:100%!important}
        #controls{width:100%;padding:8px;display:flex;flex-direction:column;gap:6px}
        .ctrl-row{display:flex;justify-content:center;gap:8px}
        .ctrl-btn{width:64px;height:50px;border-radius:14px;border:none;font-size:22px;cursor:pointer;touch-action:manipulation}
        .ctrl-btn:active{transform:scale(0.92)}
        .ctrl-left{background:linear-gradient(145deg,#e91e63,#c2185b);color:white}
        .ctrl-right{background:linear-gradient(145deg,#2196f3,#1565c0);color:white}
        .ctrl-serv{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white}
        .btn-sm{padding:6px 16px;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-weight:bold;background:rgba(255,255,255,0.15);color:white}
        #status{font-size:12px;text-align:center;padding:3px;opacity:0.7}
        .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px}
        .overlay.show{display:flex}
        .overlay h2{font-size:22px;text-shadow:0 0 25px gold}
        .overlay .btn-sm{padding:10px 24px;font-size:15px}
    </style>
</head>
<body>
    <div id="topBar">
        <h1>🏓 Ping Pong</h1>
        <div class="view-bar">
            <button class="view-btn" id="v2d">2D</button>
            <button class="view-btn active" id="v3d">3D</button>
        </div>
        <div class="mode-bar">
            <button class="mode-btn active" id="mAi">🤖 AI</button>
            <button class="mode-btn" id="m2p">👥 2K</button>
        </div>
    </div>
    <div id="scoreBar">
        <div class="score active" id="s1">Sen 0</div>
        <div class="score" id="s2">AI 0</div>
    </div>
    <div id="gameContainer"></div>
    <div id="controls">
        <div class="ctrl-row">
            <button class="ctrl-btn ctrl-left" id="btnL">◀</button>
            <button class="ctrl-btn ctrl-serv" id="btnS">▶ Servis</button>
            <button class="ctrl-btn ctrl-right" id="btnR">▶</button>
        </div>
        <div class="ctrl-row">
            <button class="btn-sm" id="btnNew">🔄 Yeni</button>
        </div>
    </div>
    <div id="status">Servis ver!</div>
    <div class="overlay" id="overlay">
        <h2 id="winText"></h2>
        <button class="btn-sm" id="btnAgain">🔄 Tekrar Oyna</button>
    </div>

<script>
(function(){
var viewMode='3d',gameMode='ai';
var score=[0,0],WIN=5,serving=true,servingPlayer=0;
var aiThinking=false;

// ─── 2D State ───
var canvas,ctx;
var paddles=[{x:50},{x:50}],ball={x:200,y:300,vx:0,vy:0},paddleW=80,paddleH=12,ballR=8;
var keys={},touchLeft=false,touchRight=false;
var W=400,H=500;

// ─── 3D State ───
var scene,camera,renderer;
var paddleMeshes=[],ballMesh3d,tableMesh,tableW=3,tableH=5;
var aiTarget=0;

function init3D(){
    var container=document.getElementById('gameContainer');
    var w=container.clientWidth,h=container.clientHeight;
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a0a1a);
    scene.fog=new THREE.Fog(0x0a0a1a,8,20);
    camera=new THREE.PerspectiveCamera(50,w/h,0.1,100);
    camera.position.set(0,5,5);
    camera.lookAt(0,0,0);
    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(w,h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    container.innerHTML='';container.appendChild(renderer.domElement);

    // Işıklar
    scene.add(new THREE.AmbientLight(0x404060,0.6));
    var dir=new THREE.DirectionalLight(0xffffff,0.8);
    dir.position.set(3,8,5);scene.add(dir);
    var spot=new THREE.PointLight(0xffaa00,0.4,10);
    spot.position.set(0,5,0);scene.add(spot);

    // Masa
    var tableGeo=new THREE.BoxGeometry(tableW,0.1,tableH);
    var tableMat=new THREE.MeshPhongMaterial({color:0x1565C0});
    tableMesh=new THREE.Mesh(tableGeo,tableMat);
    tableMesh.position.y=-0.5;scene.add(tableMesh);

    // Masa çizgileri
    var lineGeo=new THREE.PlaneGeometry(tableW-0.05,0.02);
    var lineMat=new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.5,transparent:true});
    var centerLine=new THREE.Mesh(lineGeo,lineMat);
    centerLine.rotation.x=-Math.PI/2;centerLine.position.y=-0.44;scene.add(centerLine);

    // Masa kenarları
    var borderGeo=new THREE.BoxGeometry(tableW+0.1,0.15,0.05);
    var borderMat=new THREE.MeshPhongMaterial({color:0x0D47A1});
    [-1,1].forEach(function(s){
        var b=new THREE.Mesh(borderGeo,borderMat);
        b.position.set(0,-0.42,s*tableH/2);scene.add(b);
    });

    // Raketi (karakter olarak - gözleri var!)
    paddleMeshes=[];
    for(var i=0;i<2;i++){
        var group=new THREE.Group();

        // Raket gövdesi
        var padGeo=new THREE.BoxGeometry(0.7,0.08,0.15);
        var padMat=new THREE.MeshPhongMaterial({color:i===0?0xFF5722:0x2196F3});
        var pad=new THREE.Mesh(padGeo,padMat);
        group.add(pad);

        // Sol göz
        var eyeGeo=new THREE.SphereGeometry(0.04,8,8);
        var eyeMat=new THREE.MeshPhongMaterial({color:0xffffff});
        var pupilMat=new THREE.MeshPhongMaterial({color:0x111111});
        var lEye=new THREE.Mesh(eyeGeo,eyeMat);
        lEye.position.set(-0.15,0.08,0);group.add(lEye);
        var lPupil=new THREE.Mesh(new THREE.SphereGeometry(0.02,8,8),pupilMat);
        lPupil.position.set(-0.15,0.08,0.04);group.add(lPupil);

        // Sağ göz
        var rEye=new THREE.Mesh(eyeGeo,eyeMat);
        rEye.position.set(0.15,0.08,0);group.add(rEye);
        var rPupil=new THREE.Mesh(new THREE.SphereGeometry(0.02,8,8),pupilMat);
        rPupil.position.set(0.15,0.08,0.04);group.add(rPupil);

        // Gülümseme
        var smileShape=new THREE.Shape();
        smileShape.moveTo(-0.12,0);smileShape.quadraticCurveTo(0,-0.06,0.12,0);
        var smileGeo=new THREE.TubeGeometry(new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.12,0,0),
            new THREE.Vector3(0,-0.04,0),
            new THREE.Vector3(0.12,0,0)
        ]),8,0.008,4,false);
        var smile=new THREE.Mesh(smileGeo,new THREE.MeshPhongMaterial({color:0x333333}));
        smile.position.set(0,0.05,0.06);group.add(smile);

        group.position.y=-0.44;
        group.position.z=i===0?-tableH/2+0.3:tableH/2-0.3;
        scene.add(group);
        paddleMeshes.push(group);
    }

    // Top
    var ballGeo=new THREE.SphereGeometry(0.06,12,12);
    var ballMat=new THREE.MeshPhongMaterial({color:0xFFFF00,emissive:0x554400});
    ballMesh3d=new THREE.Mesh(ballGeo,ballMat);
    ballMesh3d.position.y=-0.38;
    scene.add(ballMesh3d);

    // Top gölgesi
    var shadowGeo=new THREE.CircleGeometry(0.08,16);
    var shadowMat=new THREE.MeshBasicMaterial({color:0x000000,opacity:0.3,transparent:true});
    var shadow=new THREE.Mesh(shadowGeo,shadowMat);
    shadow.rotation.x=-Math.PI/2;shadow.position.y=-0.43;ballMesh3d.add(shadow);

    // 2D state'i 3D'ye çevir
    ball.x=0;ball.y=-tableH/2+0.3;ball.vx=0;ball.vy=0;
    paddles[0].x=0;paddles[1].x=0;

    render3D();
}

function init2D(){
    var container=document.getElementById('gameContainer');
    container.innerHTML='';
    canvas=document.createElement('canvas');
    ctx=canvas.getContext('2d');
    container.appendChild(canvas);
    W=container.clientWidth;H=container.clientHeight;
    canvas.width=W;canvas.height=H;
    paddleW=W*0.2;
    ball.x=0;ball.y=0;ball.vx=0;ball.vy=0;
    paddles[0].x=0;paddles[1].x=0;
    ballR=Math.min(12,W*0.03);
    render2D();
}

// ─── 2D Rendering ───
function render2D(){
    if(!ctx)return;
    ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);
    // Masa
    var mTop=40,mBot=H-40,mLeft=30,mRight=W-30;
    ctx.fillStyle='#1565C0';
    ctx.beginPath();ctx.roundRect(mLeft,mTop,mRight-mLeft,mBot-mTop,8);ctx.fill();
    // Orta çizgi
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(mLeft,(mTop+mBot)/2);ctx.lineTo(mRight,(mTop+mBot)/2);ctx.stroke();
    ctx.setLineDash([]);
    // Paddle'lar
    var p1x=W/2+paddles[0].x-paddleW/2;
    ctx.fillStyle='#FF5722';ctx.beginPath();ctx.roundRect(p1x,mBot-20,paddleW,10,5);ctx.fill();
    var p2x=W/2+paddles[1].x-paddleW/2;
    ctx.fillStyle='#2196F3';ctx.beginPath();ctx.roundRect(p2x,mTop+10,paddleW,10,5);ctx.fill();
    // Top
    ctx.fillStyle='#FFD700';ctx.beginPath();
    ctx.arc(W/2+ball.x,H/2+ball.y,ballR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF8';ctx.beginPath();
    ctx.arc(W/2+ball.x-2,H/2+ball.y-2,ballR*0.3,0,Math.PI*2);ctx.fill();
}

function update2D(){
    if(serving)return;
    ball.x+=ball.vx;ball.y+=ball.vy;
    var mTop=-(H/2-50),mBot=H/2-50;
    if(Math.abs(ball.x)>W/2-30-ballR){ball.vx*=-1;ball.x=Math.sign(ball.x)*(W/2-31-ballR);}
    // Paddle çarpışma
    var pBot=H/2-20,pTop=-(H/2-30);
    if(ball.y+ballR>=pTop&&ball.y-ballR<=pTop+10&&ball.vy<0){
        var px=W/2+paddles[0].x;
        if(Math.abs(ball.x)<paddleW/2+ballR){ball.vy*=-1.05;ball.y=pTop+ballR+1;ball.vx+=(ball.x-px)*0.01;}
    }
    if(ball.y-ballR<=pBot+10&&ball.y+ballR>=pBot&&ball.vy>0){
        var px=W/2+paddles[1].x;
        if(Math.abs(ball.x)<paddleW/2+ballR){ball.vy*=-1.05;ball.y=pBot-ballR-1;ball.vx+=(ball.x-px)*0.01;}
    }
    // Skor
    if(ball.y>mBot+20){scorePoint(1);}
    if(ball.y<mTop-20){scorePoint(0);}
}

function serveBall2D(){
    var dir=servingPlayer===0?1:-1;
    ball.x=0;ball.y=0;
    ball.vx=(Math.random()-0.5)*2;
    ball.vy=dir*4;
    serving=false;
}

// ─── 3D Rendering ───
function render3D(){
    if(!renderer)return;
    // Paddle pozisyonları
    paddleMeshes[0].position.x=paddles[0].x;
    paddleMeshes[1].position.x=paddles[1].x;
    // Ball pozisyonu
    ballMesh3d.position.x=ball.x;
    ballMesh3d.position.z=ball.y;
    ballMesh3d.rotation.z+=ball.vx*0.3;
    ballMesh3d.rotation.x+=ball.vy*0.1;
    // Kamera
    var camDist=4.5;
    camera.position.y=camDist;
    camera.position.z=camDist*0.5;
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
}

function update3D(){
    if(serving)return;
    var limitX=(tableW/2)-0.4,limitZ=(tableH/2)-0.3;
    ball.x+=ball.vx*0.02;ball.y+=ball.vy*0.02;
    if(Math.abs(ball.x)>limitX){ball.vx*=-1;ball.x=Math.sign(ball.x)*limitX;}
    // Paddle çarpışma (3D)
    var p1z=-limitZ,p2z=limitZ;
    if(ball.vy<0&&ball.y<=p1z+0.15&&ball.y>=p1z-0.1&&Math.abs(ball.x-paddles[0].x)<0.5){
        ball.vy*=-1.1;ball.y=p1z+0.15;ball.vx+=(ball.x-paddles[0].x)*0.5;
    }
    if(ball.vy>0&&ball.y>=p2z-0.15&&ball.y<=p2z+0.1&&Math.abs(ball.x-paddles[1].x)<0.5){
        ball.vy*=-1.1;ball.y=p2z-0.15;ball.vx+=(ball.x-paddles[1].x)*0.5;
    }
    // Skor
    if(ball.y>p2z+1){scorePoint(0);}
    if(ball.y<p1z-1){scorePoint(1);}
}

function serveBall3D(){
    var dir=servingPlayer===0?1:-1;
    ball.x=0;ball.y=0;
    ball.vx=(Math.random()-0.5)*0.5;
    ball.vy=dir*0.12;
    serving=false;
}

// ─── Game Logic ───
function scorePoint(player){
    score[player]++;updateScoreUI();
    serving=true;servingPlayer=1-player;
    ball.vx=0;ball.vy=0;
    if(viewMode==='2d'){ball.x=0;ball.y=0;}else{ball.x=0;ball.y=0;}
    updateStatus(servingPlayer===0?'Sen servis yap!':'AI servis yapıyor...');
    if(score[player]>=WIN){
        var winText=(player===0?'Sen':'AI')+' Kazandı! 🏆';
        document.getElementById('winText').textContent=winText;
        document.getElementById('overlay').classList.add('show');
        return;
    }
    if(gameMode==='ai'&&servingPlayer===1)setTimeout(serveBall,1000);
}

function serveBall(){
    if(viewMode==='3d')serveBall3D();else serveBall2D();
}

function updateScoreUI(){
    document.getElementById('s1').textContent='Sen '+score[0];
    document.getElementById('s2').textContent='AI '+score[1];
    document.getElementById('s1').classList.toggle('active',!serving&&servingPlayer===0);
    document.getElementById('s2').classList.toggle('active',!serving&&servingPlayer===1);
}

function updateStatus(msg){document.getElementById('status').textContent=msg;}

function gameLoop(){
    requestAnimationFrame(gameLoop);
    if(viewMode==='3d'){
        update3D();render3D();
    }else{
        update2D();render2D();
    }
}

// ─── AI ───
function aiMove(){
    if(gameMode!=='ai'||serving)return;
    var target=ball.x*0.8;
    var diff=target-paddles[1].x;
    paddles[1].x+=Math.max(-0.06,Math.min(0.06,diff));
}

function aiServe(){
    if(gameMode==='ai'&&servingPlayer===1&&serving){
        updateStatus('AI servis yapıyor...');
        setTimeout(serveBall,1200);
    }
}

// ─── Input ───
function setupControls(){
    document.getElementById('btnL').addEventListener('touchstart',function(e){e.preventDefault();touchLeft=true;});
    document.getElementById('btnL').addEventListener('touchend',function(e){e.preventDefault();touchLeft=false;});
    document.getElementById('btnR').addEventListener('touchstart',function(e){e.preventDefault();touchRight=true;});
    document.getElementById('btnR').addEventListener('touchend',function(e){e.preventDefault();touchRight=false;});
    document.getElementById('btnS').addEventListener('click',function(){if(serving)serveBall();});
    document.getElementById('btnNew').addEventListener('click',resetGame);
    document.getElementById('btnAgain').addEventListener('click',function(){resetGame();});

    document.addEventListener('keydown',function(e){keys[e.key]=true;});
    document.addEventListener('keyup',function(e){keys[e.key]=false;});

    // Swipe ile paddle hareketi
    var startX=0;
    document.getElementById('gameContainer').addEventListener('touchstart',function(e){
        startX=e.touches[0].clientX;e.preventDefault();
    },{passive:false});
    document.getElementById('gameContainer').addEventListener('touchmove',function(e){
        e.preventDefault();
        var dx=e.touches[0].clientX-startX;
        var maxMove=viewMode==='3d'?1.5:W/2-40;
        paddles[0].x=Math.max(-maxMove,Math.min(maxMove,dx*0.01));
    },{passive:false});
}

// ─── Input Process ───
function processInput(){
    var speed=viewMode==='3d'?0.08:5;
    var max=viewMode==='3d'?1.5:W/2-40;
    if(touchLeft||keys['ArrowLeft']||keys['a'])paddles[0].x=Math.max(-max,paddles[0].x-speed);
    if(touchRight||keys['ArrowRight']||keys['d'])paddles[0].x=Math.min(max,paddles[0].x+speed);
    aiMove();
}

function resetGame(){
    score=[0,0];serving=true;servingPlayer=0;
    ball.x=0;ball.y=0;ball.vx=0;ball.vy=0;
    paddles[0].x=0;paddles[1].x=0;
    updateScoreUI();updateStatus('Sen servis yap!');
    document.getElementById('overlay').classList.remove('show');
    aiServe();
}

function switchView(mode){
    viewMode=mode;
    document.getElementById('v2d').classList.toggle('active',mode==='2d');
    document.getElementById('v3d').classList.toggle('active',mode==='3d');
    if(mode==='3d')init3D();else init2D();
}

// ─── Game Loop Wrapper ───
var mainLoop=function(){
    processInput();
    requestAnimationFrame(mainLoop);
};

// ─── Init ───
document.getElementById('v2d').addEventListener('click',function(){switchView('2d');});
document.getElementById('v3d').addEventListener('click',function(){switchView('3d');});
document.getElementById('mAi').addEventListener('click',function(){gameMode='ai';document.getElementById('mAi').classList.add('active');document.getElementById('m2p').classList.remove('active');resetGame();});
document.getElementById('m2p').addEventListener('click',function(){gameMode='2p';document.getElementById('m2p').classList.add('active');document.getElementById('mAi').classList.remove('active');resetGame();});

setupControls();
init3D();
gameLoop();
mainLoop();
aiServe();
})();
</script>
</body>
</html>
