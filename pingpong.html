<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏓 Ping Pong King</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a1a;height:100vh;display:flex;flex-direction:column;font-family:'Segoe UI',sans-serif;color:white;user-select:none;overflow:hidden}
        #topBar{width:100%;padding:5px 8px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.6);z-index:10;flex-shrink:0}
        #topBar h1{font-size:14px}
        .bar-group{display:flex;gap:3px;background:rgba(255,255,255,0.1);border-radius:14px;padding:2px}
        .bar-btn{padding:3px 8px;border:none;border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:10px;white-space:nowrap}
        .bar-btn.active{background:rgba(255,215,0,0.3);color:#FFD700}
        .bar-btn.v-active{background:rgba(0,180,255,0.3);color:#00B4FF}
        #scoreBar{display:flex;justify-content:center;gap:10px;padding:3px;font-size:13px;flex-shrink:0}
        .score{padding:3px 10px;border-radius:6px;background:rgba(255,255,255,0.08)}
        .score.active{background:rgba(255,215,0,0.2);border:1px solid gold}
        #gameContainer{flex:1;width:100%;position:relative;touch-action:none;min-height:0}
        #gameContainer canvas{width:100%!important;height:100%!important;display:block}
        #controls{width:100%;padding:4px 8px;display:flex;justify-content:center;gap:6px;flex-shrink:0}
        .ctrl-btn{width:60px;height:44px;border-radius:12px;border:none;font-size:20px;cursor:pointer;touch-action:manipulation}
        .ctrl-btn:active{transform:scale(0.93)}
        .ctrl-l{background:linear-gradient(145deg,#e91e63,#c2185b);color:white}
        .ctrl-r{background:linear-gradient(145deg,#2196f3,#1565c0);color:white}
        .ctrl-s{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white}
        #status{font-size:11px;text-align:center;padding:2px;opacity:0.6;flex-shrink:0}
        .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px}
        .overlay.show{display:flex}
        .overlay h2{font-size:22px;text-shadow:0 0 25px gold}
        .overlay .btn{padding:10px 24px;font-size:15px;border:none;border-radius:12px;background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white;cursor:pointer}
    </style>
</head>
<body>
    <div id="topBar">
        <h1>🏓 Ping Pong</h1>
        <div class="bar-group">
            <button class="bar-btn v-active" id="v3d">3D</button>
            <button class="bar-btn" id="v2d">2D</button>
        </div>
        <div class="bar-group">
            <button class="bar-btn active" id="mAi">🤖 AI</button>
            <button class="bar-btn" id="m2p">👥 2K</button>
        </div>
    </div>
    <div id="scoreBar">
        <div class="score active" id="s1">Sen 0</div>
        <div class="score" id="s2">AI 0</div>
    </div>
    <div id="gameContainer"></div>
    <div id="controls">
        <button class="ctrl-btn ctrl-l" id="btnL">◀</button>
        <button class="ctrl-btn ctrl-s" id="btnS">▶ Servis</button>
        <button class="ctrl-btn ctrl-r" id="btnR">▶</button>
    </div>
    <div id="status">Servis ver!</div>
    <div class="overlay" id="overlay">
        <h2 id="winText"></h2>
        <button class="btn" id="btnAgain">🔄 Tekrar Oyna</button>
    </div>

<script>
(function(){
var viewMode='3d',gameMode='ai';
var score=[0,0],WIN=5,serving=true,servingPlayer=0;
var keys={},touchL=false,touchR=false;

// ─── 2D ───
var canvas,ctx,W2,H2;
var p2d=[{x:0},{x:0}],ball2={x:0,y:0,vx:0,vy:0};
var pw2,ph2,br2;

// ─── 3D ───
var scene,camera,renderer,clock;
var pad3d=[],ball3d,tableMesh,camAngle=0;

function init3D(){
    var c=document.getElementById('gameContainer');
    var w=c.clientWidth,h=c.clientHeight;
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x080818);
    scene.fog=new THREE.FogExp2(0x080818,0.08);
    camera=new THREE.PerspectiveCamera(45,w/h,0.1,50);
    // Kamera: masa boyunca bakacak açıda
    camera.position.set(0,6,6);
    camera.lookAt(0,0,0.5);
    renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(w,h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled=true;
    c.innerHTML='';c.appendChild(renderer.domElement);
    clock=new THREE.Clock();

    // Işıklar
    scene.add(new THREE.AmbientLight(0x404080,0.8));
    var dl=new THREE.DirectionalLight(0xffffff,0.7);
    dl.position.set(2,8,4);dl.castShadow=true;scene.add(dl);
    var pl=new THREE.PointLight(0xffdd44,0.5,12);
    pl.position.set(0,4,0);scene.add(pl);

    // Masa
    var tw=2.8,tl=5;
    var tGeo=new THREE.BoxGeometry(tw,0.08,tl);
    var tMat=new THREE.MeshPhongMaterial({color:0x1565C0,specular:0x333333,shininess:30});
    tableMesh=new THREE.Mesh(tGeo,tMat);
    tableMesh.receiveShadow=true;
    tableMesh.position.y=-0.5;scene.add(tableMesh);

    // Masa bacakları
    var legGeo=new THREE.CylinderGeometry(0.06,0.06,0.4);
    var legMat=new THREE.MeshPhongMaterial({color:0x333333});
    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(function(p){
        var leg=new THREE.Mesh(legGeo,legMat);
        leg.position.set(p[0]*(tw/2-0.15),-0.74,p[1]*(tl/2-0.15));
        scene.add(leg);
    });

    // Masa çizgileri
    var lineMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.4});
    var lineH=new THREE.Mesh(new THREE.PlaneGeometry(tw-0.1,0.02),lineMat);
    lineH.rotation.x=-Math.PI/2;lineH.position.set(0,-0.46,0);scene.add(lineH);
    var lineV=new THREE.Mesh(new THREE.PlaneGeometry(0.02,tl-0.1),lineMat);
    lineV.rotation.x=-Math.PI/2;lineV.position.set(0,-0.46,0);scene.add(lineV);

    // Masa kenarları
    var bGeo=new THREE.BoxGeometry(tw+0.12,0.12,0.04);
    var bMat=new THREE.MeshPhongMaterial({color:0x0D47A1});
    [-1,1].forEach(function(s){
        var b=new THREE.Mesh(bGeo,bMat);
        b.position.set(0,-0.44,s*tl/2);scene.add(b);
    });

    // Raketler - karakterler (göz + gülümseme)
    pad3d=[];
    for(var i=0;i<2;i++){
        var g=new THREE.Group();

        // Gövde
        var padG=new THREE.BoxGeometry(0.65,0.1,0.14);
        var padM=new THREE.MeshPhongMaterial({color:i===0?0xFF5722:0x2196F3,specular:0x555555,shininess:40});
        var pad=new THREE.Mesh(padG,padM);pad.castShadow=true;g.add(pad);

        // Kulp
        var hGeo=new THREE.CylinderGeometry(0.03,0.02,0.18);
        var hMat=new THREE.MeshPhongMaterial({color:0x8D6E63});
        var handle=new THREE.Mesh(hGeo,hMat);
        handle.rotation.x=Math.PI/2;handle.position.y=-0.14;g.add(handle);

        // Sol göz
        var eGeo=new THREE.SphereGeometry(0.035,8,8);
        var wMat=new THREE.MeshPhongMaterial({color:0xffffff});
        var bMat2=new THREE.MeshPhongMaterial({color:0x111111});
        var lE=new THREE.Mesh(eGeo,wMat);lE.position.set(-0.13,0.06,0.05);g.add(lE);
        var lP=new THREE.Mesh(new THREE.SphereGeometry(0.018,8,8),bMat2);lP.position.set(-0.13,0.06,0.07);g.add(lP);

        // Sağ göz
        var rE=new THREE.Mesh(eGeo,wMat);rE.position.set(0.13,0.06,0.05);g.add(rE);
        var rP=new THREE.Mesh(new THREE.SphereGeometry(0.018,8,8),bMat2);rP.position.set(0.13,0.06,0.07);g.add(rP);

        // Gülümseme
        var smG=new THREE.TubeGeometry(new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.1,0,0),
            new THREE.Vector3(-0.05,-0.03,0),
            new THREE.Vector3(0.05,-0.03,0),
            new THREE.Vector3(0.1,0,0)
        ]),12,0.007,4,false);
        var sm=new THREE.Mesh(smG,new THREE.MeshPhongMaterial({color:0x333333}));
        sm.position.set(0,0.04,0.06);g.add(sm);

        // Kaşlar
        var bRowG=new THREE.TubeGeometry(new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.18,0.1,0.04),new THREE.Vector3(-0.08,0.12,0.04)
        ]),4,0.005,4,false);
        var brow=new THREE.Mesh(bRowG,new THREE.MeshPhongMaterial({color:0x333333}));
        g.add(brow);
        var brow2=brow.clone();brow2.position.x=0.26;g.add(brow2);

        g.position.y=-0.38;
        g.position.z=i===0?-tl/2+0.35:tl/2-0.35;
        scene.add(g);
        pad3d.push(g);
    }

    // Top
    var ballGeo=new THREE.SphereGeometry(0.055,16,16);
    var ballMat=new THREE.MeshPhongMaterial({color:0xFFFF00,emissive:0x665500,specular:0xffffff,shininess:80});
    ball3d=new THREE.Mesh(ballGeo,ballMat);ball3d.castShadow=true;
    ball3d.position.y=-0.38;scene.add(ball3d);

    // Top gölgesi (masa üstünde)
    var shGeo=new THREE.CircleGeometry(0.07,16);
    var shMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.25});
    var sh=new THREE.Mesh(shGeo,shMat);sh.rotation.x=-Math.PI/2;
    sh.position.y=-0.45;scene.add(sh);
    ball3d.userData.shadow=sh;

    ball2.x=0;ball2.y=0;ball2.vx=0;ball2.vy=0;
    p2d[0].x=0;p2d[1].x=0;
}

function render3D(){
    if(!renderer)return;
    // Paddle pozisyonları
    pad3d[0].position.x=p2d[0].x*0.5;
    pad3d[1].position.x=p2d[1].x*0.5;

    // Top pozisyonu
    ball3d.position.x=ball2.x*0.5;
    ball3d.position.z=ball2.y*0.5;
    ball3d.rotation.z+=ball2.vx*0.3;

    // Gölge
    if(ball3d.userData.shadow){
        ball3d.userData.shadow.position.x=ball3d.position.x;
        ball3d.userData.shadow.position.z=ball3d.position.z;
    }

    // Dinamik kamera - topu takip eder
    var time=clock?clock.getElapsedTime():0;
    var camX=ball3d.position.x*0.3;
    var camY=5.5+Math.sin(time*0.5)*0.3;
    var camZ=5.5+Math.cos(time*0.3)*0.2;
    camera.position.set(camX,camY,camZ);
    camera.lookAt(ball3d.position.x*0.2, -0.2, 0);

    renderer.render(scene,camera);
}

// ─── 2D ───
function init2D(){
    var c=document.getElementById('gameContainer');
    c.innerHTML='';
    canvas=document.createElement('canvas');
    ctx=canvas.getContext('2d');
    c.appendChild(canvas);
    W2=c.clientWidth;H2=c.clientHeight;
    canvas.width=W2;canvas.height=H2;
    pw2=W2*0.2;ph2=H2*0.02;br2=Math.min(10,W2*0.025);
    ball2.x=0;ball2.y=0;ball2.vx=0;ball2.vy=0;
    p2d[0].x=0;p2d[1].x=0;
}

function render2D(){
    if(!ctx)return;
    ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W2,H2);
    var mx=W2/2,my=H2/2;
    // Masa
    ctx.fillStyle='#1565C0';ctx.fillRect(20,30,W2-40,H2-60);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(20,my);ctx.lineTo(W2-20,my);ctx.stroke();
    ctx.setLineDash([]);
    // Paddle'lar
    ctx.fillStyle='#FF5722';
    ctx.beginPath();ctx.roundRect(mx+p2d[0].x-pw2/2,H2-40,pw2,ph2,4);ctx.fill();
    ctx.fillStyle='#2196F3';
    ctx.beginPath();ctx.roundRect(mx+p2d[1].x-pw2/2,35,pw2,ph2,4);ctx.fill();
    // Top
    ctx.fillStyle='#FFD700';ctx.beginPath();
    ctx.arc(mx+ball2.x,my+ball2.y,br2,0,Math.PI*2);ctx.fill();
}

// ─── Game Logic ───
var tw3=2.8,tl3=5;

function updatePhysics(){
    if(serving)return;
    var lx=viewMode==='3d'?tw3/2-0.4:W2/2-20;
    var lz=viewMode==='3d'?tl3/2:0;
    var bMax=viewMode==='3d'?tw3/2-0.3:W2/2-br2-20;

    ball2.x+=ball2.vx;
    ball2.y+=ball2.vy;

    // Yan duvar çarpışma
    if(Math.abs(ball2.x)>bMax){ball2.vx*=-1;ball2.x=Math.sign(ball2.x)*bMax;}

    // Paddle çarpışma
    var pw=viewMode==='3d'?0.65:pw2;
    if(viewMode==='3d'){
        // 3D modunda
        var p1z=-tl3/2+0.35;
        if(ball2.vy<0 && ball2.y<=p1z+0.2 && ball2.y>=p1z-0.1 && Math.abs(ball2.x*0.5-p2d[0].x*0.5)<pw/2){
            ball2.vy*=-1.08;ball2.y=p1z+0.2;
            ball2.vx+=(ball2.x*0.5-p2d[0].x*0.5)*0.3;
        }
        var p2z=tl3/2-0.35;
        if(ball2.vy>0 && ball2.y>=p2z-0.2 && ball2.y<=p2z+0.1 && Math.abs(ball2.x*0.5-p2d[1].x*0.5)<pw/2){
            ball2.vy*=-1.08;ball2.y=p2z-0.2;
            ball2.vx+=(ball2.x*0.5-p2d[1].x*0.5)*0.3;
        }
    }else{
        var ph=H2-40;
        if(ball2.vy<0 && ball2.y<=-(H2/2-40)+ph2 && ball2.y>=-(H2/2-40) && Math.abs(ball2.x)<pw2/2+br2){
            ball2.vy*=-1.08;ball2.y=-(H2/2-40)+ph2+1;
            ball2.vx+=(ball2.x-p2d[0].x)*0.02;
        }
        if(ball2.vy>0 && ball2.y>=(H2/2-40)-ph2 && ball2.y<=(H2/2-40) && Math.abs(ball2.x)<pw2/2+br2){
            ball2.vy*=-1.08;ball2.y=(H2/2-40)-ph2-1;
            ball2.vx+=(ball2.x-p2d[1].x)*0.02;
        }
    }

    // Hız sınırlaması
    ball2.vx=Math.max(-3,Math.min(3,ball2.vx));
    ball2.vy=Math.max(-0.2,Math.min(0.2,ball2.vy));

    // Skor
    if(viewMode==='3d'){
        if(ball2.y>tl3/2+0.5)scorePoint(0);
        if(ball2.y<-tl3/2-0.5)scorePoint(1);
    }else{
        if(ball2.y>H2/2)scorePoint(0);
        if(ball2.y<-H2/2)scorePoint(1);
    }
}

function scorePoint(player){
    score[player]++;updateScoreUI();
    serving=true;servingPlayer=1-player;
    ball2.x=0;ball2.y=0;ball2.vx=0;ball2.vy=0;
    p2d[0].x=0;p2d[1].x=0;
    updateStatus(servingPlayer===0?'Sen servis yap!':'AI servis yapıyor...');
    if(score[player]>=WIN){
        document.getElementById('winText').textContent=(player===0?'Sen':'AI')+' Kazandı! 🏆';
        document.getElementById('overlay').classList.add('show');
        return;
    }
    if(gameMode==='ai'&&servingPlayer===1)setTimeout(serveBall,1000);
}

function serveBall(){
    if(!serving)return;
    var dir=servingPlayer===0?1:-1;
    ball2.x=(Math.random()-0.5)*0.5;
    ball2.y=0;
    ball2.vx=(Math.random()-0.5)*0.5;
    ball2.vy=dir*0.1;
    serving=false;
}

function updateScoreUI(){
    document.getElementById('s1').textContent='Sen '+score[0];
    document.getElementById('s2').textContent='AI '+score[1];
    document.getElementById('s1').classList.toggle('active',servingPlayer===0||(!serving&&true));
    document.getElementById('s2').classList.toggle('active',servingPlayer===1);
}
function updateStatus(m){document.getElementById('status').textContent=m;}

// ─── AI ───
function aiMove(){
    if(gameMode!=='ai'||serving)return;
    var target=ball2.x*0.7;
    var diff=target-p2d[1].x;
    p2d[1].x+=Math.max(-0.08,Math.min(0.08,diff));
}

// ─── Input ───
function setupInput(){
    var bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bS=document.getElementById('btnS');

    bL.addEventListener('touchstart',function(e){e.preventDefault();touchL=true;});
    bL.addEventListener('touchend',function(e){e.preventDefault();touchL=false;});
    bL.addEventListener('mousedown',function(){touchL=true;});
    bL.addEventListener('mouseup',function(){touchL=false;});

    bR.addEventListener('touchstart',function(e){e.preventDefault();touchR=true;});
    bR.addEventListener('touchend',function(e){e.preventDefault();touchR=false;});
    bR.addEventListener('mousedown',function(){touchR=true;});
    bR.addEventListener('mouseup',function(){touchR=false;});

    bS.addEventListener('click',serveBall);
    document.getElementById('btnAgain').addEventListener('click',resetGame);

    document.addEventListener('keydown',function(e){keys[e.key]=true;});
    document.addEventListener('keyup',function(e){keys[e.key]=false;});

    // Swipe
    var sx=0;
    var gc=document.getElementById('gameContainer');
    gc.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;e.preventDefault();},{passive:false});
    gc.addEventListener('touchmove',function(e){
        e.preventDefault();
        var dx=e.touches[0].clientX-sx;
        var max=viewMode==='3d'?1.4:W2/2-pw2/2;
        p2d[0].x=Math.max(-max,Math.min(max,p2d[0].x+dx*0.015));
        sx=e.touches[0].clientX;
    },{passive:false});
}

function processInput(){
    var sp=viewMode==='3d'?0.06:4;
    var mx=viewMode==='3d'?1.4:W2/2-pw2/2;
    if(touchL||keys['ArrowLeft']||keys['a'])p2d[0].x=Math.max(-mx,p2d[0].x-sp);
    if(touchR||keys['ArrowRight']||keys['d'])p2d[0].x=Math.min(mx,p2d[0].x+sp);
    aiMove();
}

// ─── Main Loop ───
function mainLoop(){
    requestAnimationFrame(mainLoop);
    processInput();
    updatePhysics();
    if(viewMode==='3d')render3D();else render2D();
}

function resetGame(){
    score=[0,0];serving=true;servingPlayer=0;
    ball2.x=0;ball2.y=0;ball2.vx=0;ball2.vy=0;
    p2d[0].x=0;p2d[1].x=0;
    updateScoreUI();updateStatus('Sen servis yap!');
    document.getElementById('overlay').classList.remove('show');
    if(gameMode==='ai'&&servingPlayer===1)setTimeout(serveBall,1000);
}

function switchView(mode){
    viewMode=mode;
    document.getElementById('v2d').classList.toggle('active',mode==='2d');
    document.getElementById('v2d').classList.toggle('v-active',mode==='2d');
    document.getElementById('v3d').classList.toggle('active',mode==='3d');
    document.getElementById('v3d').classList.toggle('v-active',mode==='3d');
    ball2.x=0;ball2.y=0;ball2.vx=0;ball2.vy=0;p2d[0].x=0;p2d[1].x=0;
    serving=true;
    if(mode==='3d')init3D();else init2D();
}

// ─── Events ───
document.getElementById('v2d').addEventListener('click',function(){switchView('2d');});
document.getElementById('v3d').addEventListener('click',function(){switchView('3d');});
document.getElementById('mAi').addEventListener('click',function(){gameMode='ai';document.getElementById('mAi').classList.add('active');document.getElementById('m2p').classList.remove('active');resetGame();});
document.getElementById('m2p').addEventListener('click',function(){gameMode='2p';document.getElementById('m2p').classList.add('active');document.getElementById('mAi').classList.remove('active');resetGame();});

setupInput();
init3D();
clock=new THREE.Clock();
mainLoop();
})();
</script>
</body>
</html>
