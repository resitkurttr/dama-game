<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏓 Ping Pong King</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a1a;height:100vh;display:flex;flex-direction:column;font-family:'Segoe UI',sans-serif;color:white;user-select:none;overflow:hidden}
        #top{width:100%;padding:4px 6px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.6);z-index:10;flex-shrink:0}
        #top h1{font-size:14px}
        .bg{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:12px;padding:2px}
        .bb{padding:3px 7px;border:none;border-radius:10px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:10px;white-space:nowrap}
        .bb.a{background:rgba(255,215,0,0.3);color:#FFD700}
        .bb.v{background:rgba(0,180,255,0.3);color:#00B4FF}
        #sb{display:flex;justify-content:center;gap:8px;padding:3px;font-size:12px;flex-shrink:0}
        .sc{padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.08)}
        .sc.a{background:rgba(255,215,0,0.2);border:1px solid gold}
        #gc{flex:1;width:100%;position:relative;touch-action:none;min-height:0}
        #gc canvas{width:100%!important;height:100%!important;display:block}
        #ct{width:100%;padding:4px 6px;display:flex;justify-content:center;gap:6px;flex-shrink:0}
        .cb{width:56px;height:40px;border-radius:10px;border:none;font-size:18px;cursor:pointer;touch-action:manipulation}
        .cb:active{transform:scale(0.93)}
        .cl{background:linear-gradient(145deg,#e91e63,#c2185b);color:white}
        .cr{background:linear-gradient(145deg,#2196f3,#1565c0);color:white}
        .cs{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white}
        #st{font-size:11px;text-align:center;padding:2px;opacity:0.6;flex-shrink:0}
        .ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        .ov.show{display:flex}
        .ov h2{font-size:20px;text-shadow:0 0 25px gold}
        .ov .btn{padding:10px 24px;font-size:14px;border:none;border-radius:12px;background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white;cursor:pointer}
    </style>
</head>
<body>
    <div id="top">
        <h1>🏓 Ping Pong</h1>
        <div class="bg">
            <button class="bb v" id="v3d">3D</button>
            <button class="bb" id="v2d">2D</button>
        </div>
        <div class="bg">
            <button class="bb a" id="mAi">🤖 AI</button>
            <button class="bb" id="m2p">👥 2K</button>
        </div>
    </div>
    <div id="sb">
        <div class="sc a" id="s1">Sen 0</div>
        <div class="sc" id="s2">AI 0</div>
    </div>
    <div id="gc"></div>
    <div id="ct">
        <button class="cb cl" id="bL">◀</button>
        <button class="cb cs" id="bS">▶ Serve</button>
        <button class="cb cr" id="bR">▶</button>
    </div>
    <div id="st">Serve at!</div>
    <div class="ov" id="ov"><h2 id="wT"></h2><button class="btn" id="bAg">🔄 Tekrar</button></div>

<script>
(function(){
var vm='3',gm='ai';
var sc=[0,0],WN=5,serv=true,sP=0;
var k={},tL=false,tR=false;

// 2D
var c2,cx2,W2,H2;
var p2=[{x:0},{x:0}],b2={x:0,y:0,vx:0,vy:0};
var pw2,ph2,br2;

// 3D
var scene,cam,ren,clk;
var pm=[],b3,shMesh;
var tbl={w:3,h:5.5};

function init3D(){
    var c=document.getElementById('gc');
    var w=c.clientWidth,h=c.clientHeight;
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x080818);
    scene.fog=new THREE.FogExp2(0x080818,0.06);

    cam=new THREE.PerspectiveCamera(50,w/h,0.1,50);
    cam.position.set(0,7,7);
    cam.lookAt(0,0,0);

    ren=new THREE.WebGLRenderer({antialias:true});
    ren.setSize(w,h);
    ren.setPixelRatio(Math.min(window.devicePixelRatio,2));
    ren.shadowMap.enabled=true;
    c.innerHTML='';c.appendChild(ren.domElement);
    clk=new THREE.Clock();

    // Lights
    scene.add(new THREE.AmbientLight(0x404080,0.7));
    var dl=new THREE.DirectionalLight(0xffffff,0.8);
    dl.position.set(3,10,5);dl.castShadow=true;scene.add(dl);
    scene.add(new THREE.PointLight(0xffdd44,0.4,15).translateY(5));

    // Table
    var tg=new THREE.BoxGeometry(tbl.w,0.08,tbl.h);
    var tm=new THREE.MeshPhongMaterial({color:0x1565C0,specular:0x444444,shininess:30});
    var table=new THREE.Mesh(tg,tm);table.receiveShadow=true;table.position.y=-0.5;scene.add(table);

    // Center line
    var ll=new THREE.Mesh(new THREE.PlaneGeometry(tbl.w-0.1,0.025),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.4}));
    ll.rotation.x=-Math.PI/2;ll.position.y=-0.46;scene.add(ll);

    // Net
    var netG=new THREE.BoxGeometry(tbl.w-0.3,0.25,0.02);
    var netM=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.6});
    var net=new THREE.Mesh(netG,netM);net.position.y=-0.37;scene.add(net);

    // Borders
    var bG=new THREE.BoxGeometry(tbl.w+0.12,0.1,0.04);
    var bM=new THREE.MeshPhongMaterial({color:0x0D47A1});
    [-1,1].forEach(function(s){
        var b=new THREE.Mesh(bG,bM);b.position.set(0,-0.45,s*tbl.h/2);scene.add(b);
    });

    // Paddles with characters
    pm=[];
    var colors=[0xFF5722,0x2196F3];
    for(var i=0;i<2;i++){
        var g=new THREE.Group();

        // Body
        var pad=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.1,0.15),new THREE.MeshPhongMaterial({color:colors[i],specular:0x555,shininess:40}));
        pad.castShadow=true;g.add(pad);

        // Handle
        var h=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.015,0.2),new THREE.MeshPhongMaterial({color:0x8D6E63}));
        h.rotation.x=Math.PI/2;h.position.y=-0.15;g.add(h);

        // Eyes
        var eG=new THREE.SphereGeometry(0.035,8,8);
        var wM=new THREE.MeshPhongMaterial({color:0xffffff});
        var bM2=new THREE.MeshPhongMaterial({color:0x111111});
        [-1,1].forEach(function(sx){
            var eye=new THREE.Mesh(eG,wM);eye.position.set(sx*0.14,0.06,0.05);g.add(eye);
            var pupil=new THREE.Mesh(new THREE.SphereGeometry(0.018,8,8),bM2);pupil.position.set(sx*0.14,0.06,0.08);g.add(pupil);
        });

        // Smile
        var pts=[];
        for(var j=0;j<=8;j++){var t=j/8;pts.push(new THREE.Vector3(-0.1+t*0.2,-0.02+Math.sin(t*Math.PI)*0.03,0));}
        var sm=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),8,0.006,4,false),new THREE.MeshPhongMaterial({color:0x333333}));
        sm.position.y=0.04;sm.position.z=0.06;g.add(sm);

        g.position.y=-0.38;
        g.position.z=i===0?-tbl.h/2+0.4:tbl.h/2-0.4;
        scene.add(g);pm.push(g);
    }

    // Ball
    b3=new THREE.Mesh(new THREE.SphereGeometry(0.06,16,16),new THREE.MeshPhongMaterial({color:0xFFFF00,emissive:0x665500,specular:0xffffff,shininess:80}));
    b3.castShadow=true;b3.position.y=-0.38;scene.add(b3);

    // Ball shadow
    shMesh=new THREE.Mesh(new THREE.CircleGeometry(0.08,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.2}));
    shMesh.rotation.x=-Math.PI/2;shMesh.position.y=-0.46;scene.add(shMesh);

    b2.x=0;b2.y=0;b2.vx=0;b2.vy=0;
    p2[0].x=0;p2[1].x=0;
}

function render3D(){
    if(!ren)return;
    pm[0].position.x=p2[0].x*0.45;
    pm[1].position.x=p2[1].x*0.45;
    b3.position.x=b2.x*0.45;
    b3.position.z=b2.y*0.45;
    b3.rotation.z+=b2.vx*0.3;
    shMesh.position.x=b3.position.x;
    shMesh.position.z=b3.position.z;

    // Dynamic camera follows ball
    var t=clk?clk.getElapsedTime():0;
    var cx=b3.position.x*0.25;
    var cy=6+Math.sin(t*0.4)*0.4;
    var cz=6.5+Math.cos(t*0.3)*0.3;
    cam.position.set(cx,cy,cz);
    cam.lookAt(b3.position.x*0.15,-0.2,0);

    ren.render(scene,cam);
}

// 2D
function init2D(){
    var c=document.getElementById('gc');
    c.innerHTML='';
    c2=document.createElement('canvas');cx2=c2.getContext('2d');
    c.appendChild(c2);
    W2=c.clientWidth;H2=c.clientHeight;
    c2.width=W2;c2.height=H2;
    pw2=W2*0.18;ph2=10;br2=Math.min(10,W2*0.025);
    b2.x=0;b2.y=0;b2.vx=0;b2.vy=0;
    p2[0].x=0;p2[1].x=0;
}

function render2D(){
    if(!cx2)return;
    cx2.fillStyle='#0a1628';cx2.fillRect(0,0,W2,H2);
    var mx=W2/2,my=H2/2;
    // Table
    cx2.fillStyle='#1565C0';cx2.fillRect(15,25,W2-30,H2-50);
    cx2.strokeStyle='rgba(255,255,255,0.3)';cx2.lineWidth=2;cx2.setLineDash([6,4]);
    cx2.beginPath();cx2.moveTo(15,my);cx2.lineTo(W2-15,my);cx2.stroke();cx2.setLineDash([]);

    // Center line vertical
    cx2.strokeStyle='rgba(255,255,255,0.2)';cx2.lineWidth=2;
    cx2.beginPath();cx2.moveTo(mx,25);cx2.lineTo(mx,H2-25);cx2.stroke();

    // Paddles
    cx2.fillStyle='#FF5722';
    cx2.beginPath();cx2.roundRect(mx+p2[0].x-pw2/2,H2-38,pw2,ph2,5);cx2.fill();
    cx2.fillStyle='#2196F3';
    cx2.beginPath();cx2.roundRect(mx+p2[1].x-pw2/2,33,pw2,ph2,5);cx2.fill();

    // Ball
    cx2.fillStyle='#FFD700';cx2.beginPath();
    cx2.arc(mx+b2.x,my+b2.y,br2,0,Math.PI*2);cx2.fill();
    cx2.fillStyle='#FFF8';cx2.beginPath();
    cx2.arc(mx+b2.x-2,my+b2.y-2,br2*0.3,0,Math.PI*2);cx2.fill();
}

// Physics
function update(){
    if(serv)return;
    var bMax=vm==='3'?tbl.w/2-0.35:W2/2-br2-15;

    b2.x+=b2.vx;b2.y+=b2.vy;

    // Wall bounce
    if(Math.abs(b2.x)>bMax){b2.vx*=-1;b2.x=Math.sign(b2.x)*bMax;}

    // Paddle collisions
    if(vm==='3'){
        var p1z=-tbl.h/2+0.4,p2z=tbl.h/2-0.4;
        if(b2.vy<0&&b2.y<=p1z+0.15&&b2.y>=p1z-0.1&&Math.abs(b2.x*0.45-p2[0].x*0.45)<0.4){
            b2.vy=-Math.abs(b2.vy)*1.08;b2.y=p1z+0.16;
            b2.vx+=(b2.x*0.45-p2[0].x*0.45)*0.3;
        }
        if(b2.vy>0&&b2.y>=p2z-0.15&&b2.y<=p2z+0.1&&Math.abs(b2.x*0.45-p2[1].x*0.45)<0.4){
            b2.vy=Math.abs(b2.vy)*1.08;b2.y=p2z-0.16;
            b2.vx+=(b2.x*0.45-p2[1].x*0.45)*0.3;
        }
    }else{
        if(b2.vy<0&&b2.y<=-(H2/2-38)+ph2&&b2.y>=-(H2/2-38)&&Math.abs(b2.x)<pw2/2+br2){
            b2.vy=Math.abs(b2.vy)*1.08;b2.y=-(H2/2-38)+ph2+1;
            b2.vx+=(b2.x-p2[0].x)*0.015;
        }
        if(b2.vy>0&&b2.y>=(H2/2-38)-ph2&&b2.y<=(H2/2-38)&&Math.abs(b2.x)<pw2/2+br2){
            b2.vy=-Math.abs(b2.vy)*1.08;b2.y=(H2/2-38)-ph2-1;
            b2.vx+=(b2.x-p2[1].x)*0.015;
        }
    }

    b2.vx=Math.max(-2.5,Math.min(2.5,b2.vx));
    b2.vy=Math.max(-0.18,Math.min(0.18,b2.vy));

    if(vm==='3'){
        if(b2.y>tbl.h/2+0.8)scoreP(0);
        if(b2.y<-tbl.h/2-0.8)scoreP(1);
    }else{
        if(b2.y>H2/2+10)scoreP(0);
        if(b2.y<-H2/2-10)scoreP(1);
    }
}

function scoreP(p){
    sc[p]++;updSc();
    serv=true;sP=1-p;
    b2.x=0;b2.y=0;b2.vx=0;b2.vy=0;
    p2[0].x=0;p2[1].x=0;
    updSt(sP===0?'Sen serve at!':'AI serve atıyor...');
    if(sc[p]>=WN){
        document.getElementById('wT').textContent=(p===0?'Sen':'AI')+' Kazandı! 🏆';
        document.getElementById('ov').classList.add('show');return;
    }
    if(gm==='ai'&&sP===1)setTimeout(srv,1200);
}

function srv(){
    if(!serv)return;
    var dir=sP===0?-1:1;
    b2.x=(Math.random()-0.5)*0.3;
    b2.y=0;
    b2.vx=(Math.random()-0.5)*0.4;
    b2.vy=dir*0.1;
    serv=false;
}

function updSc(){
    document.getElementById('s1').textContent='Sen '+sc[0];
    document.getElementById('s2').textContent='AI '+sc[1];
    document.getElementById('s1').classList.toggle('a',sP===0);
    document.getElementById('s2').classList.toggle('a',sP===1);
}
function updSt(m){document.getElementById('st').textContent=m;}

// AI
function aiM(){
    if(gm!=='ai'||serv)return;
    var tgt=b2.x*0.75;
    var d=tgt-p2[1].x;
    p2[1].x+=Math.max(-0.07,Math.min(0.07,d));
}

// Input
function setupIn(){
    var bL=document.getElementById('bL'),bR=document.getElementById('bR');
    bL.addEventListener('touchstart',function(e){e.preventDefault();tL=true;},{passive:false});
    bL.addEventListener('touchend',function(e){e.preventDefault();tL=false;},{passive:false});
    bL.addEventListener('mousedown',function(){tL=true;});
    document.addEventListener('mouseup',function(){tL=false;});
    bR.addEventListener('touchstart',function(e){e.preventDefault();tR=true;},{passive:false});
    bR.addEventListener('touchend',function(e){e.preventDefault();tR=false;},{passive:false});
    bR.addEventListener('mousedown',function(){tR=true;});
    document.addEventListener('mouseup',function(){tR=false;});
    document.getElementById('bS').addEventListener('click',function(){srv();});
    document.getElementById('bAg').addEventListener('click',reset);
    document.addEventListener('keydown',function(e){k[e.key]=true;});
    document.addEventListener('keyup',function(e){k[e.key]=false;});

    // Swipe
    var sx=0;
    var gc=document.getElementById('gc');
    gc.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;e.preventDefault();},{passive:false});
    gc.addEventListener('touchmove',function(e){
        e.preventDefault();
        var dx=e.touches[0].clientX-sx;
        var mx=vm==='3'?1.5:W2/2-pw2/2;
        p2[0].x=Math.max(-mx,Math.min(mx,p2[0].x+dx*0.012));
        sx=e.touches[0].clientX;
    },{passive:false});
}

function procIn(){
    var sp=vm==='3'?0.06:4;
    var mx=vm==='3'?1.5:W2/2-pw2/2;
    if(tL||k['ArrowLeft']||k['a'])p2[0].x=Math.max(-mx,p2[0].x-sp);
    if(tR||k['ArrowRight']||k['d'])p2[0].x=Math.min(mx,p2[0].x+sp);
    aiM();
}

function mainLoop(){
    requestAnimationFrame(mainLoop);
    procIn();update();
    if(vm==='3')render3D();else render2D();
}

function reset(){
    sc=[0,0];serv=true;sP=0;
    b2.x=0;b2.y=0;b2.vx=0;b2.vy=0;
    p2[0].x=0;p2[1].x=0;
    updSc();updSt('Sen serve at!');
    document.getElementById('ov').classList.remove('show');
}

function switchV(m){
    vm=m;
    document.getElementById('v2d').classList.toggle('a',m==='2d');
    document.getElementById('v2d').classList.toggle('v',m==='2d');
    document.getElementById('v3d').classList.toggle('a',m==='3d');
    document.getElementById('v3d').classList.toggle('v',m==='3d');
    b2.x=0;b2.y=0;b2.vx=0;b2.vy=0;p2[0].x=0;p2[1].x=0;serv=true;
    if(m==='3')init3D();else init2D();
}

document.getElementById('v2d').addEventListener('click',function(){switchV('2d');});
document.getElementById('v3d').addEventListener('click',function(){switchV('3d');});
document.getElementById('mAi').addEventListener('click',function(){gm='ai';document.getElementById('mAi').classList.add('a');document.getElementById('m2p').classList.remove('a');reset();});
document.getElementById('m2p').addEventListener('click',function(){gm='2p';document.getElementById('m2p').classList.add('a');document.getElementById('mAi').classList.remove('a');reset();});

setupIn();init3D();
})();
</script>
</body>
</html>
