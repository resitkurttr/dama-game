<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏓 Ping Pong King</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a1a;height:100vh;display:flex;flex-direction:column;font-family:'Segoe UI',sans-serif;color:white;user-select:none;overflow:hidden}
        #top{width:100%;padding:4px 6px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.6);z-index:10;flex-shrink:0}
        #top h1{font-size:14px}
        .bg{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:12px;padding:2px}
        .bb{padding:3px 7px;border:none;border-radius:10px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:10px;white-space:nowrap}
        .bb.a{background:rgba(255,215,0,0.3);color:#FFD700}
        .bb.v{background:rgba(0,180,255,0.3);color:#00B4FF}
        #sb{display:flex;justify-content:center;gap:8px;padding:3px;font-size:12px;flex-shrink:0}
        .sc{padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.08)}
        .sc.a{background:rgba(255,215,0,0.2);border:1px solid gold}
        #gc{flex:1;width:100%;position:relative;touch-action:none;min-height:0}
        #gc canvas{width:100%!important;height:100%!important;display:block}
        #ct{width:100%;padding:4px 6px;display:flex;justify-content:center;gap:6px;flex-shrink:0}
        .cb{width:56px;height:40px;border-radius:10px;border:none;font-size:18px;cursor:pointer;touch-action:manipulation}
        .cb:active{transform:scale(0.93)}
        .cl{background:linear-gradient(145deg,#e91e63,#c2185b);color:white}
        .cr{background:linear-gradient(145deg,#2196f3,#1565c0);color:white}
        .cs{background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white}
        #st{font-size:11px;text-align:center;padding:2px;opacity:0.6;flex-shrink:0}
        .ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        .ov.show{display:flex}
        .ov h2{font-size:20px;text-shadow:0 0 25px gold}
        .ov .btn{padding:10px 24px;font-size:14px;border:none;border-radius:12px;background:linear-gradient(145deg,#4CAF50,#2E7D32);color:white;cursor:pointer}
    </style>
</head>
<body>
    <div id="top">
        <h1>🏓 Ping Pong</h1>
        <div class="bg">
            <button class="bb v" id="v3d">3D</button>
            <button class="bb" id="v2d">2D</button>
        </div>
        <div class="bg">
            <button class="bb a" id="mAi">🤖 AI</button>
            <button class="bb" id="m2p">👥 2K</button>
        </div>
    </div>
    <div id="sb">
        <div class="sc a" id="s1">Sen 0</div>
        <div class="sc" id="s2">AI 0</div>
    </div>
    <div id="gc"></div>
    <div id="ct">
        <button class="cb cl" id="bL">◀</button>
        <button class="cb cs" id="bS">▶ Serve</button>
        <button class="cb cr" id="bR">▶</button>
    </div>
    <div id="st">Serve at!</div>
    <div class="ov" id="ov"><h2 id="wT"></h2><button class="btn" id="bAg">🔄 Tekrar</button></div>

<script>
(function(){
// ── State ──
var vm='3d',gm='ai',sc=[0,0],WN=5,serv=true,sP=0;
var tL=false,tR=false,k={};

// 2D
var c2,cx2,W2,H2,pw2,ph2,br2;
var px=[0,0]; // paddle X positions (pixels from center)
var bx=0,by=0,bvx=0,bvy=0; // ball (pixels from center)

// 3D
var scene,cam,ren,clk;
var pad3d=[],ball3d,shMesh;
var BX=0,BY=0,BVX=0,BVY=0; // ball in 3D coords
var PX=[0,0]; // paddle X in 3D coords

// Table dimensions
var TW=2.8,TH=5.5;

// ──────────────────────────── 3D ────────────────────────────
function init3D(){
    var c=document.getElementById('gc');
    var w=c.clientWidth,h=c.clientHeight;
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x080818);
    scene.fog=new THREE.FogExp2(0x080818,0.05);

    cam=new THREE.PerspectiveCamera(50,w/h,0.1,60);
    cam.position.set(0,8,7);
    cam.lookAt(0,0,0);

    ren=new THREE.WebGLRenderer({antialias:true});
    ren.setSize(w,h);
    ren.setPixelRatio(Math.min(window.devicePixelRatio,2));
    ren.shadowMap.enabled=true;
    c.innerHTML='';c.appendChild(ren.domElement);
    clk=new THREE.Clock();

    scene.add(new THREE.AmbientLight(0x405070,0.6));
    var dl=new THREE.DirectionalLight(0xffffff,0.9);
    dl.position.set(2,10,5);dl.castShadow=true;scene.add(dl);
    var pl=new THREE.PointLight(0xffd700,0.5,20);pl.position.set(0,6,0);scene.add(pl);

    // Table top
    var tTbl=new THREE.Mesh(new THREE.BoxGeometry(TW,0.1,TH),new THREE.MeshPhongMaterial({color:0x1565C0,specular:0x333,shininess:25}));
    tTbl.receiveShadow=true;tTbl.position.y=-0.55;scene.add(tTbl);

    // Center net
    var netG=new THREE.BoxGeometry(TW-0.2,0.35,0.03);
    var netM=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.5});
    var net=new THREE.Mesh(netG,netM);net.position.y=-0.37;scene.add(net);

    // Border rails
    var bG=new THREE.BoxGeometry(TW+0.15,0.12,0.06);
    var bM=new THREE.MeshPhongMaterial({color:0x0D47A1});
    [-1,1].forEach(function(s){
        var b=new THREE.Mesh(bG,bM);b.position.set(0,-0.49,s*TH/2);scene.add(b);
    });

    // Paddles with faces
    pad3d=[];
    var padColors=[0xFF5722,0x2196F3];
    for(var i=0;i<2;i++){
        var g=new THREE.Group();

        // Paddle body
        var padMat=new THREE.MeshPhongMaterial({color:padColors[i],specular:0x666,shininess:40});
        var pad=new THREE.Mesh(new THREE.BoxGeometry(0.75,0.12,0.16),padMat);
        pad.castShadow=true;g.add(pad);

        // Handle
        var h=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.018,0.22),new THREE.MeshPhongMaterial({color:0x795548}));
        h.rotation.x=Math.PI/2;h.position.y=-0.16;g.add(h);

        // Eyes
        [-0.15,0.15].forEach(function(ex){
            var eye=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),new THREE.MeshPhongMaterial({color:0xffffff}));
            eye.position.set(ex,0.07,0.06);g.add(eye);
            var pupil=new THREE.Mesh(new THREE.SphereGeometry(0.02,8,8),new THREE.MeshPhongMaterial({color:0x111111}));
            pupil.position.set(ex,0.07,0.09);g.add(pupil);
        });

        // Smile
        var smPts=[];
        for(var j=0;j<=10;j++){var t=j/10;smPts.push(new THREE.Vector3(-0.12+t*0.24,-0.01+Math.sin(t*Math.PI)*0.035,0));}
        var sm=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(smPts),10,0.006,4,false),new THREE.MeshPhongMaterial({color:0x333}));
        sm.position.set(0,0.04,0.065);g.add(sm);

        // Cheeks (rosy)
        var cheek=new THREE.Mesh(new THREE.SphereGeometry(0.025,8,8),new THREE.MeshPhongMaterial({color:0xff8888,transparent:true,opacity:0.3}));
        cheek.position.set(i===0?0.22:-0.22,0.02,0.06);g.add(cheek);

        g.position.y=-0.42;
        scene.add(g);pad3d.push(g);
    }

    BX=0;BY=0;BVX=0;BVY=0;PX=[0,0];

    // Ball
    ball3d=new THREE.Mesh(new THREE.SphereGeometry(0.065,16,16),new THREE.MeshPhongMaterial({color:0xFFFF00,emissive:0x665500,specular:0xffffff,shininess:80}));
    ball3d.castShadow=true;ball3d.position.y=-0.42;scene.add(ball3d);

    // Ball shadow
    shMesh=new THREE.Mesh(new THREE.CircleGeometry(0.09,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.2}));
    shMesh.rotation.x=-Math.PI/2;shMesh.position.y=-0.49;scene.add(shMesh);
}

function render3D(){
    if(!ren)return;
    pad3d[0].position.x=PX[0];
    pad3d[1].position.x=PX[1];
    ball3d.position.x=BX;
    ball3d.position.z=BY;
    ball3d.rotation.z+=BVX*0.4;
    ball3d.rotation.x+=BVY*0.2;
    shMesh.position.x=BX;shMesh.position.z=BY;

    // Dynamic camera
    var t=clk?clk.getElapsedTime():0;
    var cx=BX*0.2;
    var cy=6.5+Math.sin(t*0.5)*0.5;
    var cz=6+Math.cos(t*0.4)*0.3;
    cam.position.set(cx,cy,cz);
    cam.lookAt(BX*0.1,-0.3,BY*0.15);

    ren.render(scene,cam);
}

// ──────────────────────────── 2D ────────────────────────────
function init2D(){
    var c=document.getElementById('gc');
    c.innerHTML='';
    c2=document.createElement('canvas');cx2=c2.getContext('2d');
    c.appendChild(c2);
    W2=c.clientWidth;H2=c.clientHeight;
    c2.width=W2;c2.height=H2;
    pw2=W2*0.18;ph2=12;br2=Math.min(12,W2*0.025);
    px=[0,0];bx=0;by=0;bvx=0;bvy=0;
}

function render2D(){
    if(!cx2)return;
    var mx=W2/2,my=H2/2;

    // Background
    cx2.fillStyle='#0a1628';cx2.fillRect(0,0,W2,H2);

    // Table
    cx2.fillStyle='#1565C0';
    var tblTop=25,tblBot=H2-25,tblL=15,tblR=W2-15;
    cx2.fillRect(tblL,tblTop,tblR-tblL,tblBot-tblTop);

    // Center line (horizontal)
    cx2.strokeStyle='rgba(255,255,255,0.35)';
    cx2.lineWidth=2;cx2.setLineDash([8,5]);
    cx2.beginPath();cx2.moveTo(tblL,my);cx2.lineTo(tblR,my);cx2.stroke();
    cx2.setLineDash([]);

    // Net (vertical center line)
    cx2.strokeStyle='rgba(255,255,255,0.2)';cx2.lineWidth=3;
    cx2.beginPath();cx2.moveTo(mx,tblTop);cx2.lineTo(mx,tblBot);cx2.stroke();

    // Paddle positions in canvas coords
    var p1x=mx+px[0]; // Player (bottom)
    var p1y=H2-45;
    var p2x=mx+px[1]; // AI (top)
    var p2y=35;

    // Player paddle (red, bottom)
    cx2.fillStyle='#FF5722';
    cx2.beginPath();cx2.roundRect(p1x-pw2/2,p1y-ph2/2,pw2,ph2,5);cx2.fill();
    cx2.fillStyle='rgba(255,255,255,0.15)';
    cx2.beginPath();cx2.roundRect(p1x-pw2/2,p1y-ph2/2,pw2,ph2/2,5);cx2.fill();

    // AI paddle (blue, top)
    cx2.fillStyle='#2196F3';
    cx2.beginPath();cx2.roundRect(p2x-pw2/2,p2y-ph2/2,pw2,ph2,5);cx2.fill();
    cx2.fillStyle='rgba(255,255,255,0.15)';
    cx2.beginPath();cx2.roundRect(p2x-pw2/2,p2y-ph2/2,pw2,ph2/2,5);cx2.fill();

    // Ball
    var ballCx=mx+bx,ballCy=my+by;
    cx2.fillStyle='#FFD700';
    cx2.beginPath();cx2.arc(ballCx,ballCy,br2,0,Math.PI*2);cx2.fill();
    // Shine
    cx2.fillStyle='rgba(255,255,255,0.5)';
    cx2.beginPath();cx2.arc(ballCx-2,ballCy-2,br2*0.3,0,Math.PI*2);cx2.fill();
}

// ──────────────────────────── Physics ────────────────────────
function physics(){
    if(serv)return;

    if(vm==='3d'){
        // 3D: BX=b2.x in 3D, BY=b2.y in 3D (z axis)
        BX+=BVX;BY+=BVY;

        // Side walls
        if(Math.abs(BX)>TW/2-0.3){BVX*=-1;BX=Math.sign(BX)*(TW/2-0.3);}

        // Player paddle (BY negative = near player)
        var p1z=-TH/2+0.45;
        if(BVY<0 && BY<=p1z+0.15 && BY>=p1z-0.15){
            if(Math.abs(BX-PX[0])<0.45){
                BVY=-BVY*1.05;
                BY=p1z+0.16;
                BVX+=(BX-PX[0])*0.25;
            }
        }

        // AI paddle (BY positive = near AI)
        var p2z=TH/2-0.45;
        if(BVY>0 && BY>=p2z-0.15 && BY<=p2z+0.15){
            if(Math.abs(BX-PX[1])<0.45){
                BVY=-BVY*1.05;
                BY=p2z-0.16;
                BVX+=(BX-PX[1])*0.25;
            }
        }

        // Speed cap
        BVX=Math.max(-2,Math.min(2,BVX));
        BVY=Math.max(-0.18,Math.min(0.18,BVY));

        // Score: ball past paddle
        if(BY<-TH/2-0.3)scoreP(0); // AI scores (ball past player)
        if(BY>TH/2+0.3)scoreP(1);  // Player scores (ball past AI)

        // Sync to 2D vars for rendering
        bx=BX*120;by=BY*60;
    }else{
        // 2D: bx,by in pixels from center
        bx+=bvx;by+=bvy;

        // Side walls
        var maxW=W2/2-br2-15;
        if(Math.abs(bx)>maxW){bvx*=-1;bx=Math.sign(bx)*maxW;}

        var p1y=H2-45; // Player paddle Y in canvas
        var p2y=35;     // AI paddle Y in canvas

        // Player paddle collision (bottom, ball going DOWN)
        if(bvy>0){
            var absY=H2/2+by; // ball absolute Y
            if(absY>=p1y-ph2/2-br2 && absY<=p1y+ph2/2+br2){
                if(Math.abs(bx-px[0])<pw2/2+br2){
                    bvy=-Math.abs(bvy)*1.05; // bounce up
                    by=-(H2/2-p1y+ph2/2+br2);
                    bvx+=(bx-px[0])*0.015;
                }
            }
        }

        // AI paddle collision (top, ball going UP)
        if(bvy<0){
            var absY=H2/2+by;
            if(absY>=p2y-ph2/2-br2 && absY<=p2y+ph2/2+br2){
                if(Math.abs(bx-px[1])<pw2/2+br2){
                    bvy=Math.abs(bvy)*1.05; // bounce down
                    by=(H2/2-p2y+ph2/2+br2);
                    bvx+=(bx-px[1])*0.015;
                }
            }
        }

        // Speed cap
        bvx=Math.max(-4,Math.min(4,bvx));
        bvy=Math.max(-5,Math.min(5,bvy));

        // Score
        if(H2/2+by>H2)scoreP(0);   // AI scores
        if(H2/2+by<0)scoreP(1);    // Player scores

        // Sync to 3D vars
        BX=bx/120;BY=by/60;
    }
}

// ──────────────────────────── Game Logic ─────────────────────
function scoreP(p){
    sc[p]++;updSc();
    serv=true;sP=1-p;
    bx=0;by=0;bvx=0;bvy=0;
    BX=0;BY=0;BVX=0;BVY=0;
    px[0]=0;px[1]=0;PX[0]=0;PX[1]=0;
    updSt(sP===0?'Sen serve at!':'AI serve atıyor...');
    if(sc[p]>=WN){
        document.getElementById('wT').textContent=(p===0?'Sen':'AI')+' Kazandı! 🏆';
        document.getElementById('ov').classList.add('show');return;
    }
    if(gm==='ai'&&sP===1)setTimeout(srv,1200);
}

function srv(){
    if(!serv)return;
    var dir=sP===0?1:-1; // Player serves UP (positive = toward AI), AI serves DOWN
    if(vm==='3d'){
        BX=(Math.random()-0.5)*0.3;
        BY=0;
        BVX=(Math.random()-0.5)*0.3;
        BVY=dir*0.08;
    }else{
        bx=(Math.random()-0.5)*30;
        by=0;
        bvx=(Math.random()-0.5)*1.5;
        bvy=dir*1.5;
    }
    serv=false;
}

function aiMove(){
    if(gm!=='ai'||serv)return;
    var tgt;
    if(vm==='3d'){
        tgt=BX*0.7+Math.sin(Date.now()*0.002)*0.1;
        var d=tgt-PX[1];
        PX[1]+=Math.max(-0.08,Math.min(0.08,d));
    }else{
        tgt=bx*0.7+Math.sin(Date.now()*0.002)*15;
        var d=tgt-px[1];
        px[1]+=Math.max(-5,Math.min(5,d));
    }
}

function updSc(){
    document.getElementById('s1').textContent='Sen '+sc[0];
    document.getElementById('s2').textContent='AI '+sc[1];
    document.getElementById('s1').classList.toggle('a',sP===0);
    document.getElementById('s2').classList.toggle('a',sP===1);
}
function updSt(m){document.getElementById('st').textContent=m;}

// ──────────────────────────── Input ─────────────────────────
function procIn(){
    if(vm==='3d'){
        var sp=0.08,mx=TW/2-0.35;
        if(tL||k['ArrowLeft']||k['a'])PX[0]=Math.max(-mx,PX[0]-sp);
        if(tR||k['ArrowRight']||k['d'])PX[0]=Math.min(mx,PX[0]+sp);
    }else{
        var sp=5,mx=W2/2-pw2/2-10;
        if(tL||k['ArrowLeft']||k['a'])px[0]=Math.max(-mx,px[0]-sp);
        if(tR||k['ArrowRight']||k['d'])px[0]=Math.min(mx,px[0]+sp);
    }
    aiMove();
}

// ──────────────────────────── Main Loop ─────────────────────
function loop(){
    requestAnimationFrame(loop);
    procIn();physics();
    if(vm==='3d')render3D();else render2D();
}

function reset(){
    sc=[0,0];serv=true;sP=0;
    bx=0;by=0;bvx=0;bvy=0;
    BX=0;BY=0;BVX=0;BVY=0;
    px=[0,0];PX=[0,0];
    updSc();updSt('Sen serve at!');
    document.getElementById('ov').classList.remove('show');
}

function switchV(m){
    vm=m;
    document.getElementById('v2d').classList.toggle('a',m==='2d');
    document.getElementById('v2d').classList.toggle('v',m==='2d');
    document.getElementById('v3d').classList.toggle('a',m==='3d');
    document.getElementById('v3d').classList.toggle('v',m==='3d');
    reset();
    if(m==='3d')init3D();else init2D();
}

// ──────────────────────────── Events ────────────────────────
function setupIn(){
    var bL=document.getElementById('bL'),bR=document.getElementById('bR');
    bL.addEventListener('touchstart',function(e){e.preventDefault();tL=true;},{passive:false});
    bL.addEventListener('touchend',function(e){e.preventDefault();tL=false;},{passive:false});
    bL.addEventListener('mousedown',function(){tL=true;});
    document.addEventListener('mouseup',function(){tL=false;});
    bR.addEventListener('touchstart',function(e){e.preventDefault();tR=true;},{passive:false});
    bR.addEventListener('touchend',function(e){e.preventDefault();tR=false;},{passive:false});
    bR.addEventListener('mousedown',function(){tR=true;});
    document.addEventListener('mouseup',function(){tR=false;});
    document.getElementById('bS').addEventListener('click',srv);
    document.getElementById('bAg').addEventListener('click',reset);
    document.addEventListener('keydown',function(e){k[e.key]=true;});
    document.addEventListener('keyup',function(e){k[e.key]=false;});

    // Swipe on game container
    var sx=0,gc=document.getElementById('gc');
    gc.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;e.preventDefault();},{passive:false});
    gc.addEventListener('touchmove',function(e){
        e.preventDefault();
        var dx=e.touches[0].clientX-sx;
        if(vm==='3d'){
            var mx=TW/2-0.35;
            PX[0]=Math.max(-mx,Math.min(mx,PX[0]+dx*0.01));
        }else{
            var mx=W2/2-pw2/2-10;
            px[0]=Math.max(-mx,Math.min(mx,px[0]+dx*0.5));
        }
        sx=e.touches[0].clientX;
    },{passive:false});
}

document.getElementById('v2d').addEventListener('click',function(){switchV('2d');});
document.getElementById('v3d').addEventListener('click',function(){switchV('3d');});
document.getElementById('mAi').addEventListener('click',function(){gm='ai';document.getElementById('mAi').classList.add('a');document.getElementById('m2p').classList.remove('a');reset();});
document.getElementById('m2p').addEventListener('click',function(){gm='2p';document.getElementById('m2p').classList.add('a');document.getElementById('mAi').classList.remove('a');reset();});

setupIn();init3D();loop();
})();
</script>
</body>
</html>
