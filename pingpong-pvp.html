<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🏓 Ping Pong PvP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:sans-serif;color:#fff}
body{display:flex;flex-direction:column}
#hdr{display:flex;justify-content:center;gap:6px;padding:6px;background:#111;flex-shrink:0}
#hdr button{padding:5px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:#222;color:#aaa}
#hdr button.on{background:#FFD700;color:#000}
#scr{display:flex;justify-content:center;gap:12px;padding:4px;background:#111;flex-shrink:0;font-size:14px;font-weight:bold}
#scr span{padding:2px 12px;border-radius:6px;background:#1a1a2e}
#scr .me{color:#FF5722}
#scr .opp{color:#4CAF50}
#game{flex:1;position:relative;overflow:hidden}
#game canvas{display:block;width:100%;height:100%}
#ctl{display:flex;justify-content:center;gap:8px;padding:8px;background:#111;flex-shrink:0}
#ctl button{min-width:60px;height:44px;border:none;border-radius:10px;font-size:18px;cursor:pointer}
#ctl .bl{background:#e91e63;color:#fff}
#ctl .br{background:#2196f3;color:#fff}
#ctl .bs{background:#4CAF50;color:#fff;flex:1;max-width:140px;font-size:14px}
#ctl .bs.waiting{background:#FF9800}
#ctl .bs.disabled{background:#555;color:#888;cursor:not-allowed}
#msg{text-align:center;padding:2px;font-size:12px;color:#888;background:#0a0a1a;flex-shrink:0}
#status{text-align:center;padding:4px;font-size:11px;color:#4CAF50;background:#111;flex-shrink:0}
.win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.win.show{display:flex}
.win h2{font-size:22px}
.win button{padding:10px 24px;border:none;border-radius:10px;background:#4CAF50;color:#fff;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div id="hdr">
  <button class="on" id="mAi">🤖 AI</button>
  <button id="mPvP">🌐 PvP Online</button>
</div>
<div id="scr"><span class="me">Sen: 0</span><span class="opp">Rakip: 0</span></div>
<div id="game"></div>
<div id="ctl">
  <button class="bl" id="bL">◀</button>
  <button class="bs" id="bS">▶ SERVE</button>
  <button class="br" id="bR">▶</button>
</div>
<div id="status">AI modu — Servis için butona bas</div>
<div id="msg">Sol/sağ butonlar veya ekranı kaydır</div>
<div class="win" id="win"><h2 id="wT"></h2><button id="bR2">🔄 Tekrar</button></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  window.supabase = { createClient };
</script>
<script src="supabase-integration.js"></script>
<script>
// ════════════════════════════════════════════════
//  PING PONG PvP — Supabase Realtime Multiplayer
// ════════════════════════════════════════════════
var G={
  W:0, H:0,
  scores:[0,0], win:5,
  ai:true, serving:true, server:0,
  bx:0, by:0, bvx:0, bvy:0, br:8,
  p1x:0, p2x:0,
  padW:90, padH:14,
  lHeld:false, rHeld:false,
  cvs:null, cx:null, raf:null,
  // PvP state
  pvp:false, gameId:null, myPlayerNum:null, opponentId:null,
  connected:false, syncPending:false
};

function init(){
  var box=document.getElementById('game');
  G.cvs=document.createElement('canvas');
  box.appendChild(G.cvs);
  G.cx=G.cvs.getContext('2d');
  resize();
  resetBall();
  loop();
  bindUI();
  initSupabase();
}

function resize(){
  var box=document.getElementById('game');
  G.W=box.clientWidth;
  G.H=box.clientHeight;
  G.cvs.width=G.W;
  G.cvs.height=G.H;
  G.padW=Math.min(100,G.W*0.16);
  G.p1x=G.W/2;
  G.p2x=G.W/2;
}

function resetBall(){
  G.bx=G.W/2;
  G.by=G.H/2;
  G.bvx=0;
  G.bvy=0;
  G.p1x=G.W/2;
  G.p2x=G.W/2;
}

function serve(){
  if(!G.serving) return;
  if(G.pvp && G.myPlayerNum!==G.server){
    setMsg('Rakibin servis atmak zorunda');
    return;
  }
  G.serving=false;
  var dir=G.server===0?-1:1;
  G.bvx=(Math.random()-0.5)*2;
  G.bvy=dir*(2+Math.random()*1.5);
  setMsg(G.server===0?'Sen servis attın!':'Rakip servis attı');
  if(G.pvp) sendState({serve:true, server:G.server, bvx:G.bvx, bvy:G.bvy});
}

function physics(){
  if(G.serving) return;
  var padY1=G.H-30;
  var padY2=30;

  G.bx+=G.bvx;
  G.by+=G.bvy;

  // Side walls
  if(G.bx-G.br<0){G.bx=G.br;G.bvx=Math.abs(G.bvx);}
  if(G.bx+G.br>G.W){G.bx=G.W-G.br;G.bvx=-Math.abs(G.bvx);}

  // Player paddle (bottom) — ball going down
  if(G.bvy>0 && G.by+G.br>=padY1-G.padH/2 && G.by-G.br<=padY1+G.padH/2){
    if(Math.abs(G.bx-G.p1x)<G.padW/2+G.br){
      G.by=padY1-G.padH/2-G.br;
      G.bvy=-Math.abs(G.bvy)*1.05;
      G.bvx+=(G.bx-G.p1x)*0.12;
      if(G.pvp) sendState({ball:{x:G.bx,y:G.by,vx:G.bvx,vy:G.bvy}});
    }
  }

  // Opponent paddle (top) — ball going up
  if(G.bvy<0 && G.by-G.br<=padY2+G.padH/2 && G.by+G.br>=padY2-G.padH/2){
    if(Math.abs(G.bx-G.p2x)<G.padW/2+G.br){
      G.by=padY2+G.padH/2+G.br;
      G.bvy=Math.abs(G.bvy)*1.05;
      G.bvx+=(G.bx-G.p2x)*0.12;
    }
  }

  // Speed cap
  G.bvx=Math.max(-8,Math.min(8,G.bvx));
  G.bvy=Math.max(-8,Math.min(8,G.bvy));

  // Score
  if(G.by>G.H+20) score(1);
  if(G.by<-20) score(0);
}

function score(who){
  G.scores[who]++;
  updateScr();
  G.serving=true;
  G.server=who===0?1:0;
  resetBall();
  if(G.scores[who]>=G.win){
    showWin(who);
    if(G.pvp) endGame(who);
    return;
  }
  setMsg(G.server===0?'Sen servis at!':'Rakip servis atıyor...');
  if(!G.pvp && G.ai && G.server===1){
    setTimeout(serve,600);
  }
  if(G.pvp) sendState({scores:G.scores, serving:true, server:G.server});
}

function aiMove(){
  if(!G.ai||G.serving||G.pvp) return;
  var tx=G.bx+(Math.sin(Date.now()*0.003)*10);
  var d=tx-G.p2x;
  G.p2x+=Math.max(-5,Math.min(5,d*0.08));
}

function input(){
  var sp=5;
  if(G.lHeld) G.p1x=Math.max(G.padW/2,G.p1x-sp);
  if(G.rHeld) G.p1x=Math.min(G.W-G.padW/2,G.p1x+sp);
  if(!G.pvp) aiMove();
}

function draw(){
  var c=G.cx,w=G.W,h=G.H;
  c.fillStyle='#0d1b2a';c.fillRect(0,0,w,h);
  c.fillStyle='#1565C0';
  c.fillRect(10,10,w-20,h-20);
  c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=2;
  c.setLineDash([6,4]);
  c.beginPath();c.moveTo(w/2,10);c.lineTo(w/2,h-10);c.stroke();
  c.beginPath();c.moveTo(10,h/2);c.lineTo(w-10,h/2);c.stroke();
  c.setLineDash([]);

  // Player paddle (bottom)
  c.fillStyle='#FF5722';
  c.shadowColor='#FF5722';c.shadowBlur=10;
  roundRect(c,G.p1x-G.padW/2,h-30-G.padH/2,G.padW,G.padH,6);
  c.fill();c.shadowBlur=0;

  // Opponent paddle (top)
  c.fillStyle=G.pvp?'#4CAF50':'#2196F3';
  c.shadowColor=G.pvp?'#4CAF50':'#2196F3';c.shadowBlur=10;
  roundRect(c,G.p2x-G.padW/2,30-G.padH/2,G.padW,G.padH,6);
  c.fill();c.shadowBlur=0;

  // Ball
  if(!G.serving){
    c.fillStyle='#FFD700';
    c.shadowColor='#FFD700';c.shadowBlur=15;
    c.beginPath();c.arc(G.bx,G.by,G.br,0,Math.PI*2);c.fill();
    c.shadowBlur=0;
  } else {
    c.fillStyle='rgba(255,215,0,0.3)';
    c.beginPath();c.arc(G.W/2,G.H/2,G.br,0,Math.PI*2);c.fill();
  }

  // Names
  c.fillStyle='rgba(255,255,255,0.4)';c.font='10px sans-serif';c.textAlign='center';
  c.fillText(G.pvp?'🌐 Rakip':(G.ai?'🤖 AI':'Oyuncu 2'),w/2,25);
  c.fillText('Sen',w/2,h-18);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function loop(){
  input();
  physics();
  draw();
  G.raf=requestAnimationFrame(loop);
}

function updateScr(){
  var sp=document.querySelectorAll('#scr span');
  sp[0].textContent='Sen: '+G.scores[0];
  sp[1].textContent=(G.pvp?'Rakip: ':(G.ai?'Rakip: ':'2. Oyuncu: '))+G.scores[1];
}
function setMsg(t){document.getElementById('msg').textContent=t;}
function setStatus(t,c){var s=document.getElementById('status');s.textContent=t;s.style.color=c||'#4CAF50';}
function showWin(who){
  document.getElementById('wT').textContent=(who===0?'Sen ':'Rakip ')+'Kazandı! 🏆';
  document.getElementById('win').classList.add('show');
}

function resetGame(){
  if(G.raf) cancelAnimationFrame(G.raf);
  G.scores=[0,0];G.serving=true;G.server=0;
  resetBall();updateScr();setMsg('Servis atmak için butona bas');
  document.getElementById('win').classList.remove('show');
  if(G.pvp && G.gameId){
    if(window.TontonSupabase){
      window.TontonSupabase.endGame(G.gameId, G.myPlayerNum===0?G.config.userId:null, G.scores);
    }
    leaveGame();
  }
  loop();
}

function bindUI(){
  document.getElementById('bL').onmousedown=function(){G.lHeld=true;};
  document.getElementById('bL').onmouseup=function(){G.lHeld=false;};
  document.getElementById('bL').ontouchstart=function(e){e.preventDefault();G.lHeld=true;};
  document.getElementById('bL').ontouchend=function(e){e.preventDefault();G.lHeld=false;};

  document.getElementById('bR').onmousedown=function(){G.rHeld=true;};
  document.getElementById('bR').onmouseup=function(){G.rHeld=false;};
  document.getElementById('bR').ontouchstart=function(e){e.preventDefault();G.rHeld=true;};
  document.getElementById('bR').ontouchend=function(e){e.preventDefault();G.rHeld=false;};

  document.onmouseup=function(){G.lHeld=false;G.rHeld=false;};
  document.addEventListener('keyup',function(){G.lHeld=false;G.rHeld=false;});

  document.getElementById('bS').onclick=serve;

  var tx0=0;
  document.getElementById('game').ontouchstart=function(e){tx0=e.touches[0].clientX;e.preventDefault();};
  document.getElementById('game').ontouchmove=function(e){
    e.preventDefault();
    var dx=e.touches[0].clientX-tx0;
    G.p1x=Math.max(G.padW/2,Math.min(G.W-G.padW/2,G.p1x+dx*2));
    tx0=e.touches[0].clientX;
  };

  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft'||e.key==='a')G.lHeld=true;
    if(e.key==='ArrowRight'||e.key==='d')G.rHeld=true;
    if(e.key===' '||e.key==='Enter')serve();
  });
  document.addEventListener('keyup',function(e){
    if(e.key==='ArrowLeft'||e.key==='a')G.lHeld=false;
    if(e.key==='ArrowRight'||e.key==='d')G.rHeld=false;
  });

  document.getElementById('mAi').onclick=function(){
    G.ai=true;G.pvp=false;
    this.classList.add('on');document.getElementById('mPvP').classList.remove('on');
    setStatus('AI modu — Servis için butona bas');
    resetGame();
  };
  document.getElementById('mPvP').onclick=function(){
    if(!window.TontonSupabase || !window.TontonSupabase.isConnected()){
      setStatus('Supabase bağlı değil','#f44336');
      return;
    }
    G.ai=false;G.pvp=true;
    this.classList.add('on');document.getElementById('mAi').classList.remove('on');
    setStatus('Eşleşme aranıyor...','#FF9800');
    findPvPMatch();
  };
  document.getElementById('bR2').onclick=resetGame;
  window.onresize=resize;
}

// ═══ SUPABASE PvP INTEGRATION ═══
function initSupabase(){
  if(!window.TontonSupabase) return;
  window.TontonSupabase.init({});
  // Demo user (gerçekte Telegram WebApp initData'dan gelir)
  var tgId=697527694+Math.floor(Math.random()*1000);
  window.TontonSupabase.registerUser(tgId, 'player_'+tgId, 'Oyuncu '+tgId).then(function(user){
    if(user) G.config={userId:user.id};
    console.log('[PvP] User ready:', user?.id);
  });
}

function findPvPMatch(){
  if(!window.TontonSupabase || !G.config?.userId) return;
  window.TontonSupabase.findMatch('pingpong').then(function(result){
    if(!result) return;
    if(result.status==='waiting'){
      setStatus('Rakip bekleniyor...','#FF9800');
      document.getElementById('bS').classList.add('waiting');
      document.getElementById('bS').disabled=true;
    }else if(result.status==='matched' && result.game){
      onGameMatched(result.game);
    }
  });
}

function onGameMatched(game){
  G.gameId=game.id;
  G.myPlayerNum=game.player1_id===G.config.userId?0:1;
  G.opponentId=G.myPlayerNum===0?game.player2_id:game.player1_id;
  G.server=0; // Player 1 always serves first
  G.serving=true;
  
  setStatus('Oyun başladı! Sen '+(G.myPlayerNum===0?'🟠 (alt)':'🟢 (üst)')+'','#4CAF50');
  document.getElementById('bS').classList.remove('waiting');
  document.getElementById('bS').disabled=false;
  setMsg(G.myPlayerNum===0?'Sen servis at!':'Rakip servis atıyor...');
  
  window.TontonSupabase.subscribeToGame(G.gameId, onGameStateUpdate);
}

function onGameStateUpdate(payload){
  if(!payload || !payload.state) return;
  var state=typeof payload.state==='string'?JSON.parse(payload.state):payload.state;
  
  if(state.serve && G.serving){
    G.bvx=state.bvx;
    G.bvy=state.bvy;
    G.server=state.server;
    G.serving=false;
    setMsg(G.server===G.myPlayerNum?'Sen servis attın!':'Rakip servis attı');
  }
  
  if(state.ball){
    G.bx=state.ball.x;
    G.by=state.ball.y;
    G.bvx=state.ball.vx;
    G.bvy=state.ball.vy;
  }
  
  if(state.scores){
    G.scores=state.scores;
    updateScr();
  }
  
  if(state.paddle !== undefined && state.player !== G.myPlayerNum){
    if(state.player===1-G.myPlayerNum) G.p2x=state.paddle;
  }
  
  if(state.serving !== undefined){
    G.serving=state.serving;
    G.server=state.server;
    if(G.serving && G.server===G.myPlayerNum){
      setMsg('Sen servis at!');
    }
  }
}

function sendState(update){
  if(!G.pvp || !G.gameId || !window.TontonSupabase) return;
  if(G.syncPending) return;
  G.syncPending=true;
  
  var fullState={
    scores:G.scores,
    ball:{x:G.bx,y:G.by,vx:G.bvx,vy:G.bvy},
    paddle:G.p1x,
    player:G.myPlayerNum,
    serving:G.serving,
    server:G.server
  };
  Object.assign(fullState, update);
  
  window.TontonSupabase.updateGameState(G.gameId, fullState).then(function(){
    G.syncPending=false;
  });
}

function leaveGame(){
  if(G.gameId && window.TontonSupabase){
    window.TontonSupabase.unsubscribeFromGame();
  }
  G.gameId=null;
  G.myPlayerNum=null;
  G.opponentId=null;
  G.pvp=false;
}

function endGame(winner){
  if(!G.gameId || !window.TontonSupabase) return;
  var winnerId=winner===G.myPlayerNum?G.config.userId:G.opponentId;
  window.TontonSupabase.endGame(G.gameId, winnerId, G.scores);
}

// START
init();
</script>
</body>
</html>
