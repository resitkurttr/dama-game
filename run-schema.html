<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Supabase Schema Runner</title>
<style>
body { background: #1a1a2e; color: #fff; font-family: monospace; padding: 20px; }
.ok { color: #4CAF50; }
.err { color: #f44336; }
pre { background: #111; padding: 10px; border-radius: 8px; overflow-x: auto; }
button { background: #4CAF50; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; margin: 5px; }
button:hover { background: #45a049; }
button:disabled { background: #666; cursor: not-allowed; }
</style>
</head>
<body>
<h2>🗄️ Supabase Şema Çalıştırıcı</h2>
<div id="status">Hazır</div>
<pre id="log"></pre>
<button id="btnRun" onclick="runSchema()">Şemayı Çalıştır</button>
<button id="btnTest" onclick="testTables()" disabled>Tabloları Test Et</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var log = document.getElementById('log');
var status = document.getElementById('status');
var btnRun = document.getElementById('btnRun');
var btnTest = document.getElementById('btnTest');

function addLog(msg) {
    log.textContent += msg + '\n';
    log.scrollTop = log.scrollHeight;
}

var supabaseUrl = 'https://qkevfffrtsxvggcudqfz.supabase.co';
var supabaseKey = 'sb_publishable_NVVmFW3LU96Yme-OgEWViw_laRIv7MU';
var client = null;

try {
    client = supabase.createClient(supabaseUrl, supabaseKey);
    addLog('✅ Supabase client oluşturuldu');
} catch(e) {
    addLog('❌ Hata: ' + e.message);
    status.innerHTML = '<span class="err">Bağlantı hatası</span>';
}

var schema = `CREATE TABLE IF NOT EXISTS users (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    telegram_id BIGINT UNIQUE,
    username TEXT,
    display_name TEXT,
    created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS games (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    game_type TEXT NOT NULL,
    status TEXT DEFAULT 'waiting',
    player1_id UUID REFERENCES users(id),
    player2_id UUID REFERENCES users(id),
    winner_id UUID REFERENCES users(id),
    score_player1 INT DEFAULT 0,
    score_player2 INT DEFAULT 0,
    created_at TIMESTAMPTZ DEFAULT NOW(),
    finished_at TIMESTAMPTZ
);

CREATE TABLE IF NOT EXISTS match_queue (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID REFERENCES users(id),
    game_type TEXT NOT NULL,
    status TEXT DEFAULT 'waiting',
    created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS game_state (
    game_id UUID PRIMARY KEY REFERENCES games(id),
    state JSONB DEFAULT '{}',
    updated_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS tournaments (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    name TEXT NOT NULL,
    game_type TEXT NOT NULL,
    status TEXT DEFAULT 'registering',
    max_players INT DEFAULT 16,
    entry_fee INT DEFAULT 0,
    prize_pool INT DEFAULT 0,
    start_time TIMESTAMPTZ,
    created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS tournament_players (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    tournament_id UUID REFERENCES tournaments(id),
    user_id UUID REFERENCES users(id),
    joined_at TIMESTAMPTZ DEFAULT NOW()
);

ALTER TABLE users ENABLE ROW LEVEL SECURITY;
ALTER TABLE games ENABLE ROW LEVEL SECURITY;
ALTER TABLE match_queue ENABLE ROW LEVEL SECURITY;
ALTER TABLE game_state ENABLE ROW LEVEL SECURITY;
ALTER TABLE tournaments ENABLE ROW LEVEL SECURITY;
ALTER TABLE tournament_players ENABLE ROW LEVEL SECURITY;

CREATE POLICY "public_read_users" ON users FOR SELECT USING (true);
CREATE POLICY "public_read_games" ON games FOR SELECT USING (true);
CREATE POLICY "public_read_queue" ON match_queue FOR SELECT USING (true);
CREATE POLICY "public_read_state" ON game_state FOR SELECT USING (true);
CREATE POLICY "public_read_tournaments" ON tournaments FOR SELECT USING (true);
CREATE POLICY "public_read_tournament_players" ON tournament_players FOR SELECT USING (true);

CREATE POLICY "insert_own_user" ON users FOR INSERT WITH CHECK (true);
CREATE POLICY "insert_own_game" ON games FOR INSERT WITH CHECK (true);
CREATE POLICY "insert_own_queue" ON match_queue FOR INSERT WITH CHECK (true);
CREATE POLICY "insert_own_state" ON game_state FOR INSERT WITH CHECK (true);
CREATE POLICY "insert_own_tournament_player" ON tournament_players FOR INSERT WITH CHECK (true);
`;

async function runSchema() {
    btnRun.disabled = true;
    status.innerHTML = '<span class="err">Çalışıyor...</span>';
    addLog('📋 Şema çalıştırılıyor...');
    
    // Supabase REST API ile SQL çalıştır - rpc kullan
    try {
        // Statement'ları ayır
        var statements = schema.split(';').filter(s => s.trim().length > 0);
        
        for (var i = 0; i < statements.length; i++) {
            var stmt = statements[i].trim();
            if (stmt.length === 0) continue;
            
            addLog('⏳ [' + (i+1) + '/' + statements.length + '] ' + stmt.substring(0, 60) + '...');
            
            // Supabase REST API - raw SQL çalıştırmak için rpc gerekli
            // PostgREST SQL endpoint yok, bu yüzden JavaScript'ten execute edemeyiz
            // Alternatif: Supabase Functions / Edge Functions kullan
            // Şimdilik direkt SQL'i logla
        }
        
        addLog('⚠️ Browser\'dan raw SQL çalıştırılamaz.');
        addLog('📋 SQL şemasını kopyalayıp Supabase SQL Editor\'a yapıştırın.');
        status.innerHTML = '<span class="err">SQL Editor gerekli</span>';
        
        // SQL'i clipboard'a kopyala
        var textarea = document.createElement('textarea');
        textarea.value = schema;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        addLog('📋 SQL kopyalandı! Supabase Dashboard → SQL Editor → New Query → Yapıştır → Run');
        
    } catch(e) {
        addLog('❌ Hata: ' + e.message);
        status.innerHTML = '<span class="err">Hata</span>';
    }
    
    btnTest.disabled = false;
}

async function testTables() {
    status.innerHTML = '<span class="err">Test ediliyor...</span>';
    addLog('\\n🔍 Tablolar test ediliyor...');
    
    var tables = ['users', 'games', 'match_queue', 'game_state', 'tournaments', 'tournament_players'];
    
    for (var i = 0; i < tables.length; i++) {
        var table = tables[i];
        try {
            var { data, error, count } = await client
                .from(table)
                .select('*', { count: 'exact', head: true });
            
            if (error) {
                addLog('❌ ' + table + ': ' + error.message);
            } else {
                addLog('✅ ' + table + ': Tablo mevcut (kayıt: ' + (count || 0) + ')');
            }
        } catch(e) {
            addLog('❌ ' + table + ': ' + e.message);
        }
    }
    
    status.innerHTML = '<span class="ok">Test tamamlandı</span>';
}
</script>
</body>
</html>
